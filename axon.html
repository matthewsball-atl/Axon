<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body.dark{--bg:#0a0d08;--bg2:#101409;--bg3:#161b0e;--bg4:#1e2614;--border:rgba(125,222,58,0.1);--border2:rgba(125,222,58,0.2);--text:#eaf6d8;--text2:#9ab87a;--text3:#6a8550;--shadow:rgba(0,0,0,0.5);--accent:#7dde3a;--accent2:#4a9e1a;--accent-glow:rgba(125,222,58,0.12);--accent-text:#061202;}
body.light{--bg:#f2f4ed;--bg2:#ffffff;--bg3:#ebede5;--bg4:#e0e4d6;--border:rgba(74,94,32,0.12);--border2:rgba(74,94,32,0.22);--text:#1a2008;--text2:#3e5020;--text3:#6a7e48;--shadow:rgba(0,0,0,0.06);--accent:#5a6e2a;--accent2:#3d4f1a;--accent-glow:rgba(90,110,42,0.12);--accent-text:#f0f8e0;}
body{--accent:#7dde3a;--accent2:#4a9e1a;--accent-glow:rgba(125,222,58,0.12);--teal:#2bb5ac;--teal-dim:rgba(43,181,172,0.11);--red:#e05252;--red-dim:rgba(224,82,82,0.1);--green:#38a169;--green-dim:rgba(56,161,105,0.1);--purple:#7c5cbf;--purple-dim:rgba(124,92,191,0.1);--font-display:'DM Serif Display',serif;--font-body:'Instrument Sans',sans-serif;--font-mono:'DM Mono',monospace;--topbar:52px;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.65;height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .2s,color .2s;}
#topbar{height:var(--topbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100;}
.logo{font-family:var(--font-display);font-size:20px;color:var(--accent);letter-spacing:-0.02em;flex-shrink:0;user-select:none;}
.logo span{color:var(--text3);font-style:italic;}
#search-wrap{flex:1;max-width:440px;position:relative;}
#search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .15s;}
#search-wrap input:focus{border-color:var(--border2);}
#search-wrap input::placeholder{color:var(--text3);}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.nav-tabs{display:flex;gap:2px;margin-left:auto;align-items:center;}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:14px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:var(--font-body);transition:all .15s;}
.nav-tab:hover{background:var(--bg3);color:var(--text);}
.nav-tab.active{background:var(--bg4);color:var(--accent);}
#layout{display:flex;flex:1;overflow:hidden;}
#sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;position:relative;min-width:180px;max-width:520px;}
#resize-handle{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:10;background:transparent;transition:background .15s;}
#resize-handle:hover,#resize-handle.dragging{background:rgba(125,222,58,0.25);}
.sidebar-label{padding:14px 14px 4px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
.file-tree{flex:1;overflow-y:auto;padding:4px 8px 12px;}
.file-tree::-webkit-scrollbar{width:3px;}
.file-tree::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.folder-item{margin-bottom:2px;}
.folder-hdr{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .1s;user-select:none;}
.folder-hdr:hover{background:var(--bg3);color:var(--text);}
.farrow{font-size:9px;transition:transform .15s;color:var(--text3);}
.farrow.open{transform:rotate(90deg);}
.ficon{color:var(--accent2);font-size:12px;}
.fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fcount{font-size:10px;color:var(--text3);font-family:var(--font-mono);flex-shrink:0;}
.folder-children{padding-left:14px;}
.file-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .1s;white-space:nowrap;overflow:hidden;}
.file-item:hover{background:var(--bg3);color:var(--text);}
.file-item.active{background:var(--accent-glow);color:var(--accent);}
.fdot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.file-item.active .fdot{background:var(--accent);}
.ftext{overflow:hidden;text-overflow:ellipsis;flex:1;}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:40px;text-align:center;}
.welcome-title{font-family:var(--font-display);font-size:44px;color:var(--text);letter-spacing:-0.03em;line-height:1.2;white-space:nowrap;}
.welcome-title em{color:var(--accent);font-style:italic;}
.welcome-sub{color:var(--text2);font-size:15px;max-width:400px;line-height:1.7;}
.open-btn{display:flex;align-items:center;gap:10px;background:var(--accent);color:var(--accent-text);border:none;border-radius:10px;padding:12px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s;margin-top:4px;}
.open-btn:hover{background:var(--accent2);transform:translateY(-1px);}
.vault-hint{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.article-view{display:flex;flex:1;overflow:hidden;}
.article-main{flex:1;overflow-y:auto;padding:40px 48px;}
.article-main::-webkit-scrollbar{width:4px;}
.article-main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.article-hdr{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.article-bc{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-bottom:10px;}
.article-title{font-family:var(--font-display);font-size:34px;letter-spacing:-0.03em;line-height:1.15;color:var(--text);margin-bottom:10px;}
.article-meta{display:flex;gap:14px;align-items:center;font-size:13px;color:var(--text2);}
.atag{background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--text2);font-family:var(--font-mono);}
.md-content h1,.md-content h2,.md-content h3{font-family:var(--font-display);letter-spacing:-0.02em;color:var(--text);margin:1.8em 0 .6em;line-height:1.2;}
.md-content h1{font-size:26px;}.md-content h2{font-size:21px;}.md-content h3{font-size:17px;}
.md-content p{color:var(--text2);line-height:1.8;margin:0 0 1em;}
.md-content strong{color:var(--text);font-weight:600;}
.md-content em{color:var(--accent);font-style:italic;}
.md-content ul,.md-content ol{color:var(--text2);padding-left:1.4em;margin:0 0 1em;}
.md-content li{margin-bottom:4px;line-height:1.7;}
.md-content code{font-family:var(--font-mono);font-size:12px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--teal);}
.md-content pre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;margin:0 0 1em;}
.md-content pre code{background:none;border:none;padding:0;font-size:13px;}
.md-content blockquote{border-left:2px solid var(--accent);padding:8px 16px;margin:0 0 1em;background:var(--accent-glow);border-radius:0 6px 6px 0;}
.md-content blockquote p{color:var(--text);margin:0;}
.md-content table{width:100%;border-collapse:collapse;margin:0 0 1.2em;font-size:13px;}
.md-content th{text-align:left;padding:8px 12px;background:var(--bg3);color:var(--text);font-weight:600;border-bottom:1px solid var(--border2);font-size:12px;}
.md-content td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
.md-content tr:last-child td{border-bottom:none;}
.md-content a{color:var(--accent);text-decoration:none;}
.md-content a:hover{text-decoration:underline;}
.md-content hr{border:none;border-top:1px solid var(--border);margin:1.5em 0;}
.bl-chip{display:inline-flex;align-items:center;gap:3px;background:var(--teal-dim);border:1px solid rgba(43,181,172,.25);border-radius:4px;padding:1px 8px;font-size:12px;color:var(--teal);cursor:pointer;transition:all .1s;font-family:var(--font-mono);}
.bl-chip:hover{background:rgba(43,181,172,.2);}
.art-aside{width:210px;border-left:1px solid var(--border);padding:22px 14px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;gap:22px;}
.aside-ttl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:7px;}
.aside-link{display:block;font-size:13px;color:var(--text2);padding:4px 0;cursor:pointer;transition:color .1s;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:1px;}
.aside-link:hover{color:var(--accent);}
.toc-item{font-size:13px;color:var(--text2);padding:3px 0;cursor:pointer;transition:color .1s;line-height:1.4;}
.toc-item:hover{color:var(--text);}
.toc-item.h3{padding-left:12px;font-size:12px;}
.search-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.search-inner{padding:20px 32px 0;position:relative;}
.search-inner input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 16px 11px 36px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;}
.search-inner input::placeholder{color:var(--text3);}
.search-si{position:absolute;left:44px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.search-count{font-size:11px;color:var(--text3);font-family:var(--font-mono);padding:12px 32px 0;}
.search-results{flex:1;overflow-y:auto;padding:8px 32px 24px;}
.search-results::-webkit-scrollbar{width:4px;}
.search-results::-webkit-scrollbar-thumb{background:var(--border2);}
.sr-item{padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.sr-item:hover .sr-title{color:var(--accent);}
.sr-path{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-bottom:3px;}
.sr-title{font-size:16px;font-family:var(--font-display);color:var(--text);margin-bottom:5px;letter-spacing:-0.01em;transition:color .1s;}
.sr-excerpt{font-size:14px;color:var(--text2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sr-tags{display:flex;gap:6px;margin-top:7px;}
.actions-view{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.actions-hdr{padding:20px 28px 0;flex-shrink:0;}
.actions-top-row{display:flex;align-items:baseline;gap:12px;margin-bottom:2px;}
.actions-title{font-family:var(--font-display);font-size:26px;letter-spacing:-0.02em;color:var(--text);}
.actions-file{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.actions-week-range{font-size:12px;color:var(--text3);font-family:var(--font-mono);margin-bottom:12px;}
.add-row{display:flex;gap:8px;padding:12px 28px;flex-shrink:0;border-bottom:1px solid var(--border);}
.add-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .15s;}
.add-row input:focus{border-color:var(--border2);}
.add-row input::placeholder{color:var(--text3);}
.bkt-sel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text2);font-family:var(--font-body);font-size:13px;outline:none;cursor:pointer;}
.bkt-sel option{background:var(--bg3);}
.add-btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);white-space:nowrap;transition:all .15s;}
.add-btn:hover{background:var(--accent2);}
.buckets{display:grid;grid-template-columns:1fr 1fr 1fr;flex:1;overflow:hidden;}
.bucket{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.bucket:last-child{border-right:none;}
.bkt-hdr{padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border);}
.bkt-hdr-row{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.bkt-name{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
.bkt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bkt-count{font-size:11px;font-family:var(--font-mono);color:var(--text3);margin-left:auto;}
.bkt-sub{font-size:12px;color:var(--text2);font-family:var(--font-mono);}
.bkt-items{flex:1;overflow-y:auto;padding:6px 10px 10px;}
.bkt-items::-webkit-scrollbar{width:3px;}
.bkt-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.todo{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border-radius:7px;transition:background .1s;margin-bottom:2px;}
.todo:hover{background:var(--bg3);}
.cb{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:none;}
.cb.done{background:var(--accent);border-color:var(--accent);}
.cb.done::after{content:'✓';font-size:9px;color:var(--accent-text);font-weight:700;}
.todo-txt{flex:1;font-size:14px;color:var(--text2);line-height:1.55;cursor:text;}
.todo-txt:hover{color:var(--text);}
.todo-edit-input{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;line-height:1.5;}
.todo-acts{display:flex;gap:3px;opacity:0;transition:opacity .1s;flex-shrink:0;}
.todo:hover .todo-acts{opacity:1;}
.mv-btn{background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--text3);cursor:pointer;font-family:var(--font-mono);transition:all .1s;white-space:nowrap;}
.mv-btn:hover{color:var(--text2);border-color:var(--border2);}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;transition:color .1s;}
.del-btn:hover{color:var(--red);}
.empty-bkt{padding:20px 10px;text-align:center;color:var(--text3);font-size:12px;line-height:1.9;}
.done-section{flex-shrink:0;border-top:1px solid var(--border);}
.done-toggle{display:flex;align-items:center;gap:10px;padding:10px 28px;cursor:pointer;user-select:none;transition:background .1s;}
.done-toggle:hover{background:var(--bg3);}
.done-toggle-label{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);}
.done-toggle-count{font-size:11px;font-family:var(--font-mono);background:var(--green-dim);color:var(--green);border:1px solid rgba(56,161,105,0.2);border-radius:10px;padding:1px 8px;}
.done-arrow{font-size:9px;color:var(--text3);transition:transform .15s;margin-left:auto;}
.done-arrow.open{transform:rotate(90deg);}
.done-list{padding:0 28px 12px;display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto;}
.done-list::-webkit-scrollbar{width:3px;}
.done-list::-webkit-scrollbar-thumb{background:var(--border);}
.done-item{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border);}
.done-item:last-child{border-bottom:none;}
.done-cb{width:14px;height:14px;border-radius:3px;background:var(--green-dim);border:1px solid rgba(56,161,105,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.done-cb::after{content:'✓';font-size:8px;color:var(--green);font-weight:700;}
.done-txt{flex:1;font-size:13px;color:var(--text3);text-decoration:line-through;}
.done-date{font-size:10px;color:var(--text3);font-family:var(--font-mono);flex-shrink:0;}
.done-restore{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-family:var(--font-mono);padding:2px 6px;border-radius:4px;transition:all .1s;opacity:0;}
.done-item:hover .done-restore{opacity:1;background:var(--bg4);color:var(--text2);}
.save-bar{font-size:12px;font-family:var(--font-mono);padding:7px 28px;color:var(--text2);flex-shrink:0;display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.save-dot.ok{background:var(--green);}
.save-dot.busy{background:var(--accent);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.no-dir{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2);text-align:center;padding:40px;}
.no-dir p{font-size:14px;line-height:1.7;max-width:340px;color:var(--text3);}
.go-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--font-body);transition:all .15s;}
.go-btn:hover{color:var(--text);}
.ask-layout{display:flex;flex:1;overflow:hidden;}
.ask-history{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.ask-history-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.new-chat-btn{width:100%;background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s;display:flex;align-items:center;gap:8px;justify-content:center;}
.new-chat-btn:hover{background:var(--accent2);}
.chat-list{flex:1;overflow-y:auto;padding:8px;}
.chat-list::-webkit-scrollbar{width:3px;}
.chat-list::-webkit-scrollbar-thumb{background:var(--border2);}
.chat-list-item{padding:10px;border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:2px;}
.chat-list-item:hover{background:var(--bg3);}
.chat-list-item.active{background:var(--accent-glow);}
.cli-title{font-size:14px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.chat-list-item.active .cli-title{color:var(--accent);}
.cli-date{font-size:12px;color:var(--text2);font-family:var(--font-mono);}
.cli-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ask-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ask-msgs{flex:1;overflow-y:auto;padding:32px 48px;display:flex;flex-direction:column;gap:28px;}
.ask-msgs::-webkit-scrollbar{width:4px;}
.ask-msgs::-webkit-scrollbar-thumb{background:var(--border2);}
.ask-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;}
.ask-empty-title{font-family:var(--font-display);font-size:32px;color:var(--text2);letter-spacing:-0.02em;}
.ask-empty-sub{font-size:13px;color:var(--text3);max-width:320px;line-height:1.7;}
.msg-group{display:flex;flex-direction:column;gap:4px;max-width:720px;}
.msg-group.user{align-self:flex-end;align-items:flex-end;}
.msg-group.ai{align-self:flex-start;align-items:flex-start;}
.msg-label{font-size:11px;color:var(--text3);font-family:var(--font-mono);padding:0 4px;margin-bottom:2px;}
.msg-bubble{border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.7;color:var(--text2);}
.msg-group.user .msg-bubble{background:var(--accent);color:var(--accent-text);border-radius:12px 12px 4px 12px;}
.msg-group.ai .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;max-width:640px;}
.msg-bubble .md-content p:last-child{margin-bottom:0;}
.msg-bubble .md-content p{color:inherit;}
.msg-bubble .md-content strong{color:inherit;}
.ask-foot{padding:16px 48px 24px;border-top:1px solid var(--border);flex-shrink:0;}
.ask-input-box{display:flex;gap:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:12px 16px;align-items:flex-end;box-shadow:0 2px 8px var(--shadow);}
.ask-input-box textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;resize:none;max-height:160px;min-height:24px;}
.ask-input-box textarea::placeholder{color:var(--text3);}
.ask-send{width:34px;height:34px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;color:var(--accent-text);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-weight:700;}
.ask-send:hover{background:var(--accent2);}
.ask-send:disabled{opacity:.35;cursor:not-allowed;}
.ask-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:8px;font-family:var(--font-mono);}
.api-banner{background:var(--accent-glow);border:1px solid rgba(125,222,58,.15);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.api-banner button{background:var(--accent);color:var(--accent-text);border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Import redesign ── */
.import-view{display:flex;flex:1;overflow:hidden;flex-direction:column;}
.import-toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
.import-toolbar-title{font-family:var(--font-display);font-size:18px;letter-spacing:-0.02em;color:var(--text);flex-shrink:0;}
.type-filters{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.type-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-family:var(--font-mono);font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);transition:all .15s;user-select:none;}
.type-chip:hover{color:var(--text2);}
.type-chip.active{background:var(--accent-glow);border-color:rgba(125,222,58,.3);color:var(--accent);}
.type-chip-count{opacity:.6;font-weight:400;}
.import-toolbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text3);cursor:pointer;font-size:12px;font-family:var(--font-body);transition:all .15s;}
.refresh-btn:hover{color:var(--text2);}
/* Bulk bar */
.bulk-bar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--accent-glow);border-bottom:1px solid rgba(125,222,58,.15);flex-shrink:0;}
.bulk-count{font-size:13px;font-weight:600;color:var(--accent);}
.bulk-dest-row{display:flex;align-items:center;gap:8px;flex:1;}
.bulk-dest-label{font-size:12px;color:var(--text2);white-space:nowrap;}
.dest-select{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none;cursor:pointer;max-width:200px;}
.dest-select option{background:var(--bg3);}
.new-folder-inline{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none;width:160px;}
.new-folder-inline::placeholder{color:var(--text3);}
.bulk-import-btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);white-space:nowrap;transition:all .15s;}
.bulk-import-btn:hover{background:var(--accent2);}
.bulk-import-btn:disabled{opacity:.4;cursor:not-allowed;}
/* File list */
.import-list-wrap{flex:1;overflow-y:auto;padding:0;}
.import-list-wrap::-webkit-scrollbar{width:4px;}
.import-list-wrap::-webkit-scrollbar-thumb{background:var(--border2);}
.import-list-header{display:grid;grid-template-columns:36px 1fr 80px 180px 120px 110px;align-items:center;gap:0;padding:8px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5;}
.import-col-hdr{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);}
.select-all-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:none;flex-shrink:0;}
.select-all-cb.checked{background:var(--accent);border-color:var(--accent);}
.select-all-cb.checked::after{content:'✓';font-size:8px;color:var(--accent-text);font-weight:700;}
.select-all-cb.partial{background:var(--accent-glow);border-color:var(--accent);}
.import-row{display:grid;grid-template-columns:36px 1fr 80px 180px 120px 110px;align-items:center;gap:0;padding:0 20px;border-bottom:1px solid var(--border);min-height:52px;transition:background .1s;}
.import-row:hover{background:var(--bg3);}
.import-row.selected{background:var(--accent-glow);}
.import-row.converting{background:rgba(125,222,58,.05);}
.import-row.done-row{background:var(--green-dim);}
.import-row.err-row{background:var(--red-dim);}
.row-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:none;flex-shrink:0;}
.row-cb.checked{background:var(--accent);border-color:var(--accent);}
.row-cb.checked::after{content:'✓';font-size:8px;color:var(--accent-text);font-weight:700;}
.row-icon{font-size:18px;text-align:center;}
.row-name-cell{padding:8px 12px 8px 0;overflow:hidden;}
.row-name-display{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;}
.row-name-display:hover{color:var(--accent);}
.row-name-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:4px 8px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;}
.row-name-sub{font-size:12px;color:var(--text2);font-family:var(--font-mono);margin-top:1px;}
.row-ext{font-size:11px;font-family:var(--font-mono);color:var(--text3);background:var(--bg4);border-radius:4px;padding:2px 7px;text-align:center;display:inline-block;}
.row-dest-cell{padding:4px 12px 4px 0;}
.row-dest-select{width:100%;background:transparent;border:1px solid transparent;border-radius:5px;padding:4px 6px;color:var(--text2);font-family:var(--font-body);font-size:12px;outline:none;cursor:pointer;transition:all .15s;}
.import-row:hover .row-dest-select,.row-dest-select:focus{background:var(--bg4);border-color:var(--border2);color:var(--text);}
.row-dest-select option{background:var(--bg3);}
.row-new-folder{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:4px 6px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none;}
.row-new-folder::placeholder{color:var(--text3);}
.row-status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--font-mono);}
.status-idle{color:var(--text3);}
.status-busy{color:var(--accent);}
.status-done{color:var(--green);}
.status-err{color:var(--red);cursor:help;}
.row-actions{display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.row-import-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font-body);transition:all .15s;white-space:nowrap;}
.row-import-btn:hover{background:var(--accent);color:var(--accent-text);border-color:var(--accent);}
.row-import-btn:disabled{opacity:.4;cursor:not-allowed;}
.import-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center;padding:40px;}
.import-empty p{font-size:14px;line-height:1.7;max-width:320px;}
.import-section-hdr{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:4;}
.import-section-label{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);}
.import-section-count{font-size:11px;font-family:var(--font-mono);color:var(--text3);background:var(--bg4);border-radius:10px;padding:1px 8px;}
.import-section-hint{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.prev-row{opacity:.85;}
.prev-row:hover{opacity:1;}

/* Settings */
.settings-view{flex:1;overflow-y:auto;padding:40px 48px;}
.settings-view::-webkit-scrollbar{width:4px;}
.settings-view::-webkit-scrollbar-thumb{background:var(--border2);}
.s-title{font-family:var(--font-display);font-size:30px;letter-spacing:-0.03em;color:var(--text);margin-bottom:6px;}
.s-sub{font-size:14px;color:var(--text2);margin-bottom:36px;}
.s-section{margin-bottom:36px;}
.s-section-title{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.s-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);}
.s-row:last-child{border-bottom:none;}
.s-info{flex:1;}
.s-label{font-size:15px;color:var(--text);font-weight:500;margin-bottom:3px;}
.s-desc{font-size:13px;color:var(--text2);line-height:1.6;}
.s-ctrl{flex-shrink:0;display:flex;align-items:center;gap:8px;}
.s-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 14px;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font-body);transition:all .15s;white-space:nowrap;}
.s-btn:hover{color:var(--text);background:var(--bg4);}
.s-btn.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:600;}
.s-btn.primary:hover{background:var(--accent2);}
.s-btn.danger{border-color:rgba(224,82,82,.3);color:var(--red);}
.s-btn.danger:hover{background:var(--red-dim);}
.key-field{display:flex;gap:8px;flex:1;max-width:400px;}
.key-field input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-family:var(--font-mono);font-size:12px;outline:none;transition:border-color .15s;}
.key-field input:focus{border-color:var(--border2);}
.key-field input::placeholder{color:var(--text3);}
.dir-name{font-size:12px;color:var(--teal);font-family:var(--font-mono);background:var(--teal-dim);border:1px solid rgba(43,181,172,.2);border-radius:5px;padding:3px 10px;}
.dir-none{font-size:12px;color:var(--text3);font-family:var(--font-mono);}
.stats-view-wrap{display:flex;flex-direction:column;gap:20px;padding:24px 32px;overflow-y:auto;height:100%;}
.stats-view-wrap::-webkit-scrollbar{width:4px;}
.stats-view-wrap::-webkit-scrollbar-thumb{background:var(--border2);}
.stats-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stats-kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;flex-direction:column;gap:2px;}
.stats-kpi-val{font-family:var(--font-display);font-size:28px;color:var(--accent);letter-spacing:-0.03em;line-height:1;}
.stats-kpi-label{font-size:11px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}
.stats-kpi-sub{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stats-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
.stats-panel-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.stats-panel.full{grid-column:1/-1;}
.stats-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stats-bar-row:last-child{margin-bottom:0;}
.stats-bar-label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stats-bar-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.stats-bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.stats-bar-count{font-size:11px;color:var(--text3);font-family:var(--font-mono);width:28px;text-align:right;flex-shrink:0;}
.stats-list-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.stats-list-row:last-child{border-bottom:none;}
.stats-list-rank{font-size:11px;color:var(--text3);font-family:var(--font-mono);width:16px;flex-shrink:0;}
.stats-list-title{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stats-list-folder{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.stats-list-badge{font-size:11px;font-family:var(--font-mono);color:var(--accent);background:var(--accent-glow);border:1px solid rgba(125,222,58,.15);border-radius:4px;padding:1px 8px;flex-shrink:0;}
.stats-donut{display:flex;align-items:center;gap:20px;}
.stats-donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.stats-legend-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.stats-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stats-legend-val{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text3);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.stat-card-val{font-family:var(--font-display);font-size:26px;color:var(--accent);letter-spacing:-0.02em;}
.stat-card-label{font-size:12px;color:var(--text2);font-family:var(--font-mono);margin-top:2px;}
.stats-bar{display:flex;gap:20px;padding:8px 16px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.stat-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-family:var(--font-mono);}
.stat-val{color:var(--text2);font-weight:500;}

.browse-landing{display:flex;flex-direction:column;gap:24px;padding:32px 40px;overflow-y:auto;flex:1;}
.browse-landing::-webkit-scrollbar{width:4px;}
.browse-landing::-webkit-scrollbar-thumb{background:var(--border2);}
.browse-section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}
.browse-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.browse-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;}
.browse-card:hover{border-color:var(--border2);background:var(--bg3);}
.browse-card-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.browse-card-meta{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.browse-card-excerpt{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.browse-task-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.browse-task-row:last-child{border-bottom:none;}
.browse-task-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.browse-task-text{font-size:14px;color:var(--text2);flex:1;}
.browse-resurface{background:var(--accent-glow);border:1px solid rgba(125,222,58,.15);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .15s;}
.browse-resurface:hover{border-color:rgba(125,222,58,.3);}
.browse-resurface-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);margin-bottom:6px;}
.browse-resurface-title{font-size:16px;font-family:var(--font-display);color:var(--text);margin-bottom:4px;letter-spacing:-0.01em;}
.browse-resurface-meta{font-size:11px;color:var(--text3);font-family:var(--font-mono);}

.edu-carousel{position:relative;overflow:hidden;}
.edu-track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);}
.edu-card{min-width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:22px 24px;display:flex;flex-direction:column;gap:10px;}
.edu-topic-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-family:var(--font-mono);}
.edu-headline{font-family:var(--font-display);font-size:20px;letter-spacing:-0.02em;color:var(--text);line-height:1.25;}
.edu-body{font-size:14px;color:var(--text2);line-height:1.7;}
.edu-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.edu-explore-btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s;}
.edu-explore-btn:hover{background:var(--accent2);transform:translateY(-1px);}
.edu-explore-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.edu-nav{display:flex;align-items:center;gap:8px;}
.edu-nav-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;transition:all .15s;}
.edu-nav-btn:hover{background:var(--bg4);color:var(--text);}
.edu-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.edu-dots{display:flex;gap:5px;align-items:center;}
.edu-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .2s;cursor:pointer;}
.edu-dot.active{background:var(--accent);width:18px;border-radius:3px;}
.edu-loading{display:flex;align-items:center;gap:10px;padding:22px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text3);font-size:13px;}
.edu-error{padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text3);font-size:13px;}
.edu-settings-area{display:flex;flex-direction:column;gap:6px;}
.edu-topics-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;resize:vertical;min-height:100px;line-height:1.6;transition:border-color .15s;}
.edu-topics-input:focus{border-color:var(--accent);}
.edu-topics-hint{font-size:12px;color:var(--text3);}

.axon-illustration{width:100%;max-width:520px;margin:0 auto 4px;}
.axon-illustration svg{display:block;width:100%;height:auto;}
@media (prefers-color-scheme:dark){
  .axon-illustration .axon-line{stroke:#4a7a28;}
  .axon-illustration .myelin{fill:#1e2614;stroke:#4a7a28;}
  .axon-illustration .myelin-hl{fill:#2a3a18;}
  .axon-illustration .cell-body{fill:#1a2610;stroke:#7dde3a;}
  .axon-illustration .cell-ring{fill:none;stroke:#4a7a28;}
  .axon-illustration .terminal{stroke:#6ab830;fill:none;}
  .axon-illustration .term-dot{fill:#7dde3a;}
  .axon-illustration .sig-dot{fill:#a8f040;}
  .axon-illustration .dendrite{stroke:#3d6020;fill:none;}
  .axon-illustration .nucleus{fill:#3a6020;stroke:#7dde3a;}
}
@media (prefers-color-scheme:light){
  .axon-illustration .axon-line{stroke:#4a5c2a;}
  .axon-illustration .myelin{fill:#f0f4e8;stroke:#6a7e48;}
  .axon-illustration .myelin-hl{fill:#e4ecd4;}
  .axon-illustration .cell-body{fill:#eaf0d8;stroke:#5a6e2a;}
  .axon-illustration .cell-ring{fill:none;stroke:#8aaa50;}
  .axon-illustration .terminal{stroke:#5a7830;fill:none;}

<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// Sanitize file/folder names — strip path traversal and dangerous chars
function sanitizeName(name){
  return (name||'').trim()
    .replace(/[/\\:*?"<>|]/g,'')
    .replace(/\.\./g,'')
    .replace(/^\./,'')
    .trim();
}

// Fetch guard — only allow calls to Anthropic API
function safeFetch(url, opts){
  if(!url.startsWith('https://api.anthropic.com/')){
    console.error('Blocked fetch to unexpected URL:',url);
    return Promise.reject(new Error('Unauthorized fetch target'));
  }
  return fetch(url,opts);
}

// Safe markdown renderer — parse then sanitize with DOMPurify
function safeMarked(text){
  const raw=marked.parse(text||'');
  if(typeof DOMPurify==='undefined')return raw;
  return DOMPurify.sanitize(raw,{
    ALLOWED_TAGS:['h1','h2','h3','h4','h5','h6','p','a','ul','ol','li',
                  'blockquote','code','pre','strong','em','del','hr','br',
                  'table','thead','tbody','tr','th','td','img','span','div'],
    ALLOWED_ATTR:['href','src','alt','class','data-link'],
    ALLOW_DATA_ATTR:false,
    FORCE_HTTPS:true
  });
}

/* ── Dates ── */
function todayStr(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function isoDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getWeekRange(){const d=new Date(),day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));const fri=new Date(mon);fri.setDate(mon.getDate()+4);const fmt=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});return`${fmt(mon)} – ${fmt(fri)}, ${fri.getFullYear()}`;}
function chatTimestamp(){const d=new Date();return`${isoDate(d)}-${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;}
function friendlyDate(iso){if(!iso)return'';const d=new Date(iso.slice(0,10)+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}

/* ── File utils ── */
function extractTitle(c,f){const m=c.match(/^#\s+(.+)$/m);return m?m[1].trim():f.replace(/\.md$/,'').replace(/[-_]/g,' ');}
function extractBacklinks(c){const l=[];const re=/\[\[([^\]]+)\]\]/g;let m;while((m=re.exec(c))!==null)l.push(m[1]);return[...new Set(l)];}
function extractHeadings(c){return c.split('\n').filter(l=>/^#{1,3}\s/.test(l)).map(l=>({level:l.match(/^(#+)/)[1].length,text:l.replace(/^#+\s+/,'').replace(/\*\*/g,'')}));}
function extractExcerpt(c,n=160){const t=c.replace(/^#{1,6}\s+.+$/gm,'').replace(/\[\[([^\]]+)\]\]/g,'$1').replace(/\*\*/g,'').replace(/\*/g,'').replace(/`[^`]+`/g,'').replace(/\n+/g,' ').trim();return t.length>n?t.slice(0,n)+'…':t;}
function folderLabel(p){const a=p.split('/');return a.length>1?a[a.length-2]:'root';}
function fileExt(name){const m=name.match(/\.([^.]+)$/);return m?m[1].toLowerCase():'';}
function fileIcon(name){const ext=fileExt(name);const map={pdf:'📄',docx:'📝',doc:'📝',pptx:'📊',ppt:'📊',xlsx:'📈',xls:'📈',txt:'📃',md:'📋',png:'🖼',jpg:'🖼',jpeg:'🖼',csv:'📊'};return map[ext]||'📁';}
function formatSize(bytes){if(bytes<1024)return bytes+'B';if(bytes<1024*1024)return Math.round(bytes/1024)+'KB';return(bytes/1024/1024).toFixed(1)+'MB';}

const SKIP_DIRS=new Set(['index','chats','.git','.obsidian','node_modules']);
async function readVaultFiles(dir,path=''){
  const files=[];
  for await(const[name,handle]of dir.entries()){
    const fp=path?`${path}/${name}`:name;
    if(handle.kind==='directory'&&!name.startsWith('.')&&!SKIP_DIRS.has(name)){
      files.push(...(await readVaultFiles(handle,fp)));
    } else if(handle.kind==='file'&&name.endsWith('.md')){
      const file=await handle.getFile();const content=await file.text();
      files.push({path:fp,name,content,title:extractTitle(content,name),backlinks:extractBacklinks(content),excerpt:extractExcerpt(content),folder:folderLabel(fp),headings:extractHeadings(content)});
    }
  }
  return files;
}

async function getVaultFolders(dir,path=''){
  const folders=['__root__'];
  for await(const[name,handle]of dir.entries()){
    if(handle.kind==='directory'&&!name.startsWith('.')){
      const fp=path?`${path}/${name}`:name;
      folders.push(fp);
      const sub=await getVaultFolders(handle,fp);
      folders.push(...sub.filter(f=>f!=='__root__'));
    }
  }
  return folders;
}

function searchFiles(files,q){if(!q.trim())return[];const ql=q.toLowerCase();return files.map(f=>{let s=0;if(f.title.toLowerCase().includes(ql))s+=10;if(f.content.toLowerCase().includes(ql))s+=1;return{...f,s};}).filter(f=>f.s>0).sort((a,b)=>b.s-a.s).slice(0,30);}

/* ── Todo ── */
const TODAY='today',WEEK='week',SOMEDAY='someday',DONE='done';
function parseTodos(content){const lines=content.split('\n');const todos=[];let bucket=WEEK;let id=0;lines.forEach(line=>{const hm=line.match(/^##\s+(.+)$/);if(hm){const h=hm[1].trim().toLowerCase();if(h==='today')bucket=TODAY;else if(h==='this week')bucket=WEEK;else if(h==='someday')bucket=SOMEDAY;else if(h==='done')bucket=DONE;return;}const tm=line.match(/^- \[([ x])\] (.+)$/);if(tm){let text=tm[2].trim();let doneDate='';const dm=text.match(/^(.+?)\s+—\s+(\d{4}-\d{2}-\d{2})$/);if(dm){text=dm[1].trim();doneDate=dm[2];}todos.push({id:id++,bucket:tm[1]==='x'?DONE:bucket,checked:tm[1]==='x',text,doneDate});}});return todos;}
function serialiseTodos(todos){const today=isoDate(new Date());const w=todos.filter(t=>t.bucket===WEEK&&!t.checked),td=todos.filter(t=>t.bucket===TODAY&&!t.checked),sm=todos.filter(t=>t.bucket===SOMEDAY&&!t.checked),dn=todos.filter(t=>t.checked||t.bucket===DONE);return['# Items','','## Today',...td.map(t=>`- [ ] ${t.text}`),'','## This Week',...w.map(t=>`- [ ] ${t.text}`),'','## Someday',...sm.map(t=>`- [ ] ${t.text}`),'','## Done',...dn.map(t=>`- [x] ${t.text} — ${t.doneDate||today}`),''].join('\n');}

function chatToJson(chat){return JSON.stringify({id:chat.id,title:chat.title,createdAt:chat.createdAt,messages:chat.messages},null,2);}
function parseChatJson(text,filename){
  try{
    const obj=JSON.parse(text||'{}');
    return{id:obj.id||filename,title:obj.title||filename,createdAt:obj.createdAt||'',messages:Array.isArray(obj.messages)?obj.messages:[]};
  }catch(e){return{id:filename,title:filename,createdAt:'',messages:[]};}
}

function useResizableSidebar(def=256){
  const[width,setWidth]=useState(def);const dragging=useRef(false);const startX=useRef(0);const startW=useRef(0);const handleRef=useRef(null);
  useEffect(()=>{const onMove=e=>{if(!dragging.current)return;setWidth(Math.max(180,Math.min(520,startW.current+(e.clientX-startX.current))));};const onUp=()=>{dragging.current=false;if(handleRef.current)handleRef.current.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';};document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);return()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};},[]);
  const onMouseDown=useCallback(e=>{dragging.current=true;startX.current=e.clientX;startW.current=width;if(handleRef.current)handleRef.current.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault();},[width]);
  return{width,onMouseDown,handleRef};
}

const EDU_CACHE_KEY='axon_edu_cache';

function getEduCache(){
  try{return JSON.parse(localStorage.getItem(EDU_CACHE_KEY)||'null');}catch(e){return null;}
}

function setEduCache(data,topicsKey){
  localStorage.setItem(EDU_CACHE_KEY,JSON.stringify({fetched:new Date().toISOString(),topicsKey:topicsKey||"",data}));
}

function isCacheValid(topicsKey){
  const c=getEduCache();
  if(!c)return false;
  if(topicsKey&&c.topicsKey&&c.topicsKey!==topicsKey)return false;
  const now=new Date();
  const fetched=new Date(c.fetched||c.date||0);
  if(now-fetched>24*60*60*1000)return false;
  if(fetched.toDateString()!==now.toDateString()){
    const sixAm=new Date(now);sixAm.setHours(6,0,0,0);
    if(now>=sixAm)return false;
  }
  return true;
}

async function fetchEduCards(topics,apiKey){
  const topicList=topics.map((t,i)=>`${i+1}. ${t}`).join('\n');
  const res=await safeFetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      messages:[{role:'user',content:`You are a cutting-edge AI strategy educator. For each of the following topics, write a brief educational teaser card. Be specific, current, and insightful — not generic. Focus on emerging concepts, recent developments, and non-obvious insights that a VP of R&D at a tech company would find valuable.

Topics:
${topicList}

Respond ONLY with a JSON array (no markdown, no preamble). Each element must have exactly these fields:
- "topic": the topic name exactly as given
- "headline": a compelling 6-10 word headline for the educational piece
- "teaser": 2-3 sentences of genuinely insightful content. Be specific and concrete, not generic.
- "prompt": the opening message to start a deep-dive chat conversation on this topic (1-2 sentences, phrased as a question or directive to explore further)

Example format:
[{"topic":"...","headline":"...","teaser":"...","prompt":"..."}]`}]
    })
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const text=data.content?.[0]?.text||'[]';
  const clean=text.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
  try{return JSON.parse(clean);}catch(e){throw new Error('Invalid JSON from API: '+text.slice(0,100));}
}

    .sort((a,b)=>b[1]-a[1]).slice(0,4)

function RichEditor({file,fileHandle,onSave,onClose,editorMode}){
  const[text,setText]=useState(file?file.content:'# Untitled\n\n');
  const[viewMode,setViewMode]=useState(editorMode||'split'); // split | write | preview
  const[saveState,setSaveState]=useState(''); // ''|'saving'|'saved'
  const taRef=useRef(null);

  useEffect(()=>{
    if(file)setText(file.content||'# '+file.title+'\n\n');
  },[file?.path]);

  const insert=(before,after='')=>{
    const ta=taRef.current;if(!ta)return;
    const s=ta.selectionStart,e=ta.selectionEnd;
    const sel=text.slice(s,e);
    const newText=text.slice(0,s)+before+sel+after+text.slice(e);
    setText(newText);
    setTimeout(()=>{ta.focus();ta.setSelectionRange(s+before.length,s+before.length+sel.length);},0);
  };

  const insertLine=(prefix)=>{
    const ta=taRef.current;if(!ta)return;
    const s=ta.selectionStart;
    const lineStart=text.lastIndexOf('\n',s-1)+1;
    const newText=text.slice(0,lineStart)+prefix+text.slice(lineStart);
    setText(newText);
    setTimeout(()=>{ta.focus();ta.setSelectionRange(s+prefix.length,s+prefix.length);},0);
  };

  const save=useCallback(async()=>{
    if(!fileHandle)return;
    setSaveState('saving');
    try{
      const w=await fileHandle.createWritable();
      await w.write(text);
      await w.close();
      setSaveState('saved');

const REGISTRY_FILE = 'import-registry.json';

async function loadRegistry(vaultHandle) {
  try {
    const fh = await vaultHandle.getFileHandle(REGISTRY_FILE, {create:false});
    const f = await fh.getFile();
    return JSON.parse(await f.text());
  } catch(e) { return {}; }
}

async function saveRegistry(vaultHandle, registry) {
  try {
    const fh = await vaultHandle.getFileHandle(REGISTRY_FILE, {create:true});
    const w = await fh.createWritable();
    await w.write(JSON.stringify(registry, null, 2));
    await w.close();
  } catch(e) { console.error('Registry save failed', e); }
}

  const extractXmlFromZip=async(arrayBuffer,xmlPaths)=>{

      const decompressed=fflate.unzipSync(uint8);
      for(const path of xmlPaths){
        const entry=Object.keys(decompressed).find(k=>k===path||k.endsWith('/'+path));
        if(entry){
          const text=new TextDecoder().decode(decompressed[entry]);
          return text;
        }
      }
    }catch(e){console.error('ZIP extract failed:',e);}
    return null;
  };

  const extractDocxText=async(file)=>{
    const buf=await readFileAsArrayBuffer(file);
    const xml=await extractXmlFromZip(buf,['word/document.xml']);
    if(!xml)return null;
    // Extract text runs from Word XML
    const runs=[];
    const re=/<w:t[^>]*>([^<]*)<\/w:t>/g;
    let m;
    while((m=re.exec(xml))!==null)runs.push(m[1]);
    // Also get paragraph breaks
    const withParas=xml.replace(/<\/w:p>/g,'\n').replace(/<w:t[^>]*>/g,'').replace(/<\/w:t>/g,'').replace(/<[^>]+>/g,'').replace(/\n+/g,'\n').trim();
    return withParas||runs.join(' ');
  };

  const extractPptxText=async(file)=>{
    const buf=await readFileAsArrayBuffer(file);
    try{
      const uint8=new Uint8Array(buf);
      const decompressed=fflate.unzipSync(uint8);
      const slideKeys=Object.keys(decompressed).filter(k=>k.match(/ppt\/slides\/slide\d+\.xml/)).sort();
      const texts=[];
      for(const key of slideKeys){
        const xml=new TextDecoder().decode(decompressed[key]);
        const slideNum=key.match(/slide(\d+)/)?.[1];
        const runs=[];
        const re=/<a:t>([^<]*)<\/a:t>/g;
        let m;
        while((m=re.exec(xml))!==null)if(m[1].trim())runs.push(m[1]);
        if(runs.length>0)texts.push(`## Slide ${slideNum}\n${runs.join(' ')}`);
      }
      return texts.join('\n\n')||null;
    }catch(e){return null;}
  };

  const extractXlsxText=async(file)=>{
    const buf=await readFileAsArrayBuffer(file);
    try{
      const uint8=new Uint8Array(buf);
      const decompressed=fflate.unzipSync(uint8);
      // Get shared strings
      const ssKey=Object.keys(decompressed).find(k=>k.includes('sharedStrings'));
      const sharedStrings=[];
      if(ssKey){
        const xml=new TextDecoder().decode(decompressed[ssKey]);
        const re=/<t[^>]*>([^<]*)<\/t>/g;
        let m;
        while((m=re.exec(xml))!==null)sharedStrings.push(m[1]);
      }
      // Get sheet data
      const sheetKeys=Object.keys(decompressed).filter(k=>k.match(/xl\/worksheets\/sheet\d+\.xml/)).sort();
      const rows=[];
      for(const key of sheetKeys){
        const xml=new TextDecoder().decode(decompressed[key]);
        const rowRe=/<row[^>]*>([\s\S]*?)<\/row>/g;
        let rowM;
        while((rowM=rowRe.exec(xml))!==null){
          const cellRe=/<c[^>]*(?:t="s")[^>]*>[\s\S]*?<v>(\d+)<\/v>/g;
          const cellRe2=/<c[^>]*>[\s\S]*?<v>([^<]+)<\/v>/g;
          const cells=[];
          let cM;
          const rowXml=rowM[1];
          // Shared string refs
          const sharedRe=/<c[^>]*t="s"[^>]*>[\s\S]*?<v>(\d+)<\/v>[\s\S]*?<\/c>/g;
          while((cM=sharedRe.exec(rowXml))!==null){
            const idx=parseInt(cM[1]);
            if(sharedStrings[idx])cells.push(sharedStrings[idx]);
          }
          // Inline values
          const inlineRe=/<c(?![^>]*t="s")[^>]*>[\s\S]*?<v>([^<]+)<\/v>[\s\S]*?<\/c>/g;
          while((cM=inlineRe.exec(rowXml))!==null)cells.push(cM[1]);
          if(cells.length>0)rows.push(cells.join('\t'));
        }
      }
      return rows.join('\n')||null;
    }catch(e){return null;}
  };

  const getFileText=async(file,ext)=>{

      if(ext==='xlsx'||ext==='xls')return await extractXlsxText(file);
      if(ext==='txt'||ext==='md'||ext==='csv'){

            React.createElement('div',{className:'import-col-hdr'},'Imported'),
            React.createElement('div',null)
          ),
          prevRows.filter(r=>activeTypes.has(r.ext)).length===0
            ?React.createElement('div',{className:'import-empty'},
              React.createElement('div',{style:{fontSize:32,color:'var(--text3)',marginBottom:4}},'◈'),
              React.createElement('p',null,'No files imported yet. Switch to Candidates to get started.')
              )
            :prevRows.filter(r=>activeTypes.has(r.ext)).map(row=>renderRow(row,true))
          )
    )
  );
}

/* ── AskView ── */
function AskView({files,apiKey,chatsHandle,onGoSettings,onRescan,onForceRescan,pendingChatPrompt,clearPendingPrompt,vaultIndex,vaultHandle}){
  const[chats,setChats]=useState([]);const[activeChatId,setActiveChatId]=useState(null);const[msgs,setMsgs]=useState([]);const[input,setInput]=useState('');const[loading,setLoading]=useState(false);
  const[folderFilter,setFolderFilter]=useState([]);
  const[savingToVault,setSavingToVault]=useState(false);
  const[saveSuccess,setSaveSuccess]=useState('');
  const[saveFolderPick,setSaveFolderPick]=useState('');
  const[showSavePanel,setShowSavePanel]=useState(false);
  const bottomRef=useRef(null);const chatFileHandles=useRef({});
  // Fire pending edu chat prompt on mount
  useEffect(()=>{
    if(!pendingChatPrompt||!apiKey)return;
    // Small delay to let chat history load first
    const t=setTimeout(async()=>{
      setMsgs([]);setActiveChatId(null);
      setInput(pendingChatPrompt.prompt);
      clearPendingPrompt&&clearPendingPrompt();
      // Auto-send by calling send with the prompt directly
      const userMsg=pendingChatPrompt.prompt;
      const newMsg={role:'user',content:userMsg};
      setMsgs([newMsg]);setLoading(true);
      try{
        const ql=userMsg.toLowerCase();
        const scored=files.map(f=>{let sc=0;if(f.title.toLowerCase().includes(ql))sc+=5;return{...f,sc};});
        const ctx=scored.sort((a,b)=>b.sc-a.sc).slice(0,8).map(f=>`# ${f.title}\nPath: ${f.path}\n\n${f.content.slice(0,1000)}`).join('\n\n---\n\n');
        const res=await safeFetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:`You are Axon, a personal knowledge assistant. The user wants to explore a topic in depth. Be analytical, specific, and connect concepts to real-world applications. Reference specific note titles and paths where relevant.\n\n${ctx}`,messages:[{role:'user',content:userMsg}]})});
        const data=await res.json();
        const reply=data.content?.[0]?.text||'No response.';
        const aiMsg={role:'assistant',content:reply};
        const finalMsgs=[newMsg,aiMsg];
        setMsgs(finalMsgs);setLoading(false);
        const chatId=chatTimestamp()+'.json';
        const title=`${pendingChatPrompt.topic} — ${userMsg.slice(0,40)}`;
        const chat={id:chatId,title,createdAt:new Date().toISOString(),messages:finalMsgs};
        setActiveChatId(chatId);
        setChats(prev=>[chat,...prev]);
        // Save chat file
        if(chatsHandle){
          try{const fh=await chatsHandle.getFileHandle(chatId,{create:true});const w=await fh.createWritable();await w.write(chatToJson(chat));await w.close();}catch(e){console.error(e);}
        }
      }catch(e){setMsgs(m=>[...m,{role:'assistant',content:`Error: ${e.message}`}]);setLoading(false);}
    },300);
    return()=>clearTimeout(t);
  },[pendingChatPrompt,apiKey]);

  const loadChats=useCallback(async()=>{if(!chatsHandle)return;try{const loaded=[];for await(const[name,handle]of chatsHandle.entries()){if(handle.kind==='file'&&name.endsWith('.json')){const f=await handle.getFile();const content=await f.text();const chat=parseChatJson(content,name);loaded.push(chat);chatFileHandles.current[name]=handle;}}loaded.sort((a,b)=>b.id.localeCompare(a.id));setChats(loaded);}catch(e){console.error(e);}},[chatsHandle]);
  useEffect(()=>{loadChats();},[loadChats]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);
  const saveChat=useCallback(async(chat)=>{if(!chatsHandle)return;try{const filename=chat.id;let handle=chatFileHandles.current[filename];if(!handle){handle=await chatsHandle.getFileHandle(filename,{create:true});chatFileHandles.current[filename]=handle;}const w=await handle.createWritable();await w.write(chatToJson(chat));await w.close();}catch(e){console.error(e);}},[chatsHandle]);
  const newChat=useCallback(()=>{setActiveChatId(null);setMsgs([]);onRescan&&onRescan();},[onRescan]);
  const selectChat=useCallback((chat)=>{setActiveChatId(chat.id);setMsgs(chat.messages);},[]);
  const buildCtx=useCallback((q)=>{
    if(vaultIndex&&vaultIndex.length>0){
      const{manifest,fullContent,totalFiles}=buildTwoLayerCtx(files,vaultIndex,q,folderFilter);
      return`VAULT MANIFEST (${totalFiles} notes — titles and summaries):\n${manifest}\n\nFULL CONTENT (most relevant notes):\n${fullContent}`;
    }
    // Fallback: no index yet — use direct scoring
    const ql=q.toLowerCase();
    const filteredFiles=folderFilter.length===0?files:files.filter(f=>folderFilter.includes(f.folder));
    const scored=filteredFiles.map(f=>{
      let sc=0;
      const qwords=ql.split(/\s+/).filter(w=>w.length>2);
      if(f.title.toLowerCase().includes(ql))sc+=20;
      if(f.path.toLowerCase().includes(ql))sc+=10;
      qwords.forEach(w=>{if(f.title.toLowerCase().includes(w))sc+=5;if(f.content.toLowerCase().includes(w))sc+=2;});
      return{...f,sc};
    });
    const high=scored.filter(f=>f.sc>=10).sort((a,b)=>b.sc-a.sc).slice(0,6);
    const med=scored.filter(f=>f.sc>0&&f.sc<10).sort((a,b)=>b.sc-a.sc).slice(0,12);
    const low=scored.filter(f=>f.sc===0).slice(0,20);
    const cap=(t,w)=>{const ws=t.split(/\s+/);return ws.length>w?ws.slice(0,w).join(' ')+'…':t;};
    return[
      ...high.map(f=>`# ${f.title}\nPath: ${f.path}\n\n${cap(f.content,1500)}`),
      ...med.map(f=>`# ${f.title}\nPath: ${f.path}\n\n${cap(f.content,300)}`),
      ...low.map(f=>`# ${f.title}\nPath: ${f.path}\n\n${f.excerpt||cap(f.content,80)}`),
    ].join('\n\n---\n\n');
  },[files,vaultIndex,folderFilter]);
  const send=useCallback(async()=>{
    if(!input.trim()||loading)return;
    const userMsg=input.trim();setInput('');
    const newMsg={role:'user',content:userMsg};const updatedMsgs=[...msgs,newMsg];
    setMsgs(updatedMsgs);setLoading(true);
    try{
      const ctx=buildCtx(userMsg);
      const res=await safeFetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:`You are Axon, a personal knowledge assistant. Answer analytically and specifically. Reference note titles and paths when relevant. The vault has ${files.length} notes total${folderFilter.length>0?' (filtered to '+folderFilter.length+' folder'+(folderFilter.length!==1?'s':'')+')':''}. If asked about something not in the provided context, say so clearly rather than guessing.\n\n${ctx}`,messages:updatedMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();const reply=data.content?.[0]?.text||'No response.';
      const aiMsg={role:'assistant',content:reply};const finalMsgs=[...updatedMsgs,aiMsg];
      setMsgs(finalMsgs);
      const isNew=!activeChatId;const chatId=activeChatId||(chatTimestamp()+'.json');
      const title=userMsg.slice(0,48)+(userMsg.length>48?'…':'');
      const chat={id:chatId,title:isNew?title:(chats.find(c=>c.id===chatId)?.title||title),createdAt:isNew?new Date().toISOString():chats.find(c=>c.id===chatId)?.createdAt,messages:finalMsgs};
      if(isNew){setActiveChatId(chatId);setChats(prev=>[chat,...prev.filter(c=>c.id!==chatId)]);}else{setChats(prev=>prev.map(c=>c.id===chatId?chat:c));}
      await saveChat(chat);
    }catch(e){setMsgs(m=>[...m,{role:'assistant',content:`Error: ${e.message}`}]);}
    setLoading(false);
  },[input,msgs,loading,apiKey,files,activeChatId,chats,buildCtx,saveChat]);
  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  // Save to vault: summarise thread → write markdown → trigger rescan
  const saveToVault=useCallback(async(destFolder)=>{
    if(!msgs.length||!apiKey||!vaultHandle)return;
    setSavingToVault(true);setSaveSuccess('');
    try{
      const thread=msgs.map(m=>`**${m.role==='user'?'You':'Axon'}:** ${m.content}`).join('\n\n');
      const res=await safeFetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:`Synthesize the following chat thread into a clean, well-structured markdown research document. Include: a descriptive title as an H1, key insights and concepts discussed, any frameworks or models explored, and actionable takeaways. Write it as a standalone reference document, not a Q&A transcript. Output only the markdown.\n\nThread:\n\n${thread}`}]})
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const md=data.content?.[0]?.text||'';
      // Auto-generate filename from chat title
      const slug=(chats.find(c=>c.id===activeChatId)?.title||'research-note')
        .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,50);
      const filename=`${new Date().toISOString().slice(0,10)}-${slug}.md`;
      // Write to chosen folder
      const pathParts=destFolder&&destFolder!=='__root__'?destFolder.split('/'):[];
      let dirHandle=vaultHandle;
      for(const part of pathParts){dirHandle=await dirHandle.getDirectoryHandle(part,{create:true});}
      const fh=await dirHandle.getFileHandle(filename,{create:true});
      const w=await fh.createWritable();await w.write(md);await w.close();
      setSaveSuccess(`Saved as ${destFolder?destFolder+'/':''}${filename}`);
      setShowSavePanel(false);
      onRescan&&onRescan(true);
    }catch(e){setSaveSuccess(`Error: ${e.message}`);}
    setSavingToVault(false);
  },[msgs,apiKey,vaultHandle,activeChatId,chats,onRescan]);

  // Get unique folders from files for context selector and save picker
  const vaultFolders=useMemo(()=>[...new Set(files.map(f=>f.folder))].filter(Boolean).sort(),[files]);
  const hasAiResponse=msgs.some(m=>m.role==='assistant');
  const contextLabel=folderFilter.length===0?`All folders (${files.length} notes)`:`${folderFilter.length} folder${folderFilter.length!==1?'s':''} (${files.filter(f=>folderFilter.includes(f.folder)).length} notes)`;

  return React.createElement('div',{className:'ask-layout'},
    // ── History sidebar ──
    React.createElement('div',{className:'ask-history'},
      React.createElement('div',{className:'ask-history-top'},
        React.createElement('button',{className:'new-chat-btn',onClick:newChat},'+ New Chat'),
        React.createElement('button',{
          onClick:()=>onForceRescan&&onForceRescan(),
          style:{width:'100%',marginTop:6,background:'none',border:'1px solid var(--border2)',borderRadius:7,padding:'6px 10px',color:'var(--text3)',fontSize:11,fontFamily:'var(--font-mono)',cursor:'pointer',transition:'all .15s',display:'flex',alignItems:'center',justifyContent:'center',gap:6},
          onMouseOver:e=>{e.currentTarget.style.color='var(--text2)';},
          onMouseOut:e=>{e.currentTarget.style.color='var(--text3)';}
        },'↺  Resync vault (',files.length,' notes)')
      ),
      // ── Context folder selector ──
      vaultFolders.length>0&&React.createElement('div',{className:'ctx-selector'},
        React.createElement('div',{className:'ctx-label'},'Context'),
        React.createElement('div',{className:'ctx-folder-list'},
          React.createElement('div',{
            className:`ctx-chip ${folderFilter.length===0?'active':''}`,
            onClick:()=>setFolderFilter([])
          },
            React.createElement('div',{className:'ctx-chip-cb'}),
            React.createElement('span',null,'Full Vault')
          ),
          vaultFolders.map(folder=>React.createElement('div',{
            key:folder,
            className:`ctx-chip ${folderFilter.includes(folder)?'active':''}`,
            onClick:()=>setFolderFilter(prev=>prev.includes(folder)?prev.filter(f=>f!==folder):[...prev,folder])
          },
            React.createElement('div',{className:'ctx-chip-cb'}),
            React.createElement('span',null,folder)
          ))
        ),
        folderFilter.length>0&&React.createElement('div',{className:'ctx-all'},contextLabel)
      ),
      React.createElement('div',{className:'chat-list'},
        chats.length===0&&React.createElement('div',{style:{fontSize:12,color:'var(--text3)',padding:'16px 10px',lineHeight:1.7}},'No conversations yet.'),
        chats.map(c=>React.createElement('div',{key:c.id,className:`chat-list-item ${activeChatId===c.id?'active':''}`,onClick:()=>selectChat(c)},
          React.createElement('div',{className:'cli-title'},c.title),
          React.createElement('div',{className:'cli-date'},friendlyDate(c.createdAt||c.id)),
          c.messages.length>0&&React.createElement('div',{className:'cli-preview'},c.messages[c.messages.length-1]?.content?.slice(0,60)+'…')
        ))
      )
    ),
    // ── Chat main ──
    React.createElement('div',{className:'ask-main'},
      React.createElement('div',{className:'ask-msgs'},
        !apiKey&&React.createElement('div',{className:'api-banner'},React.createElement('span',null,'No API key set.'),React.createElement('button',{onClick:onGoSettings},'Settings')),
        msgs.length===0&&React.createElement('div',{className:'ask-empty'},
          React.createElement('div',{className:'ask-empty-title'},'Ask your vault'),
          React.createElement('div',{className:'ask-empty-sub'},contextLabel)
        ),
        msgs.map((m,i)=>React.createElement('div',{key:i,className:`msg-group ${m.role==='user'?'user':'ai'}`},
          React.createElement('div',{className:'msg-label'},m.role==='user'?'You':'Axon'),
          React.createElement('div',{className:'msg-bubble'},m.role==='user'?m.content:React.createElement('div',{className:'md-content',dangerouslySetInnerHTML:{__html:safeMarked(m.content)}}))
        )),
        loading&&React.createElement('div',{className:'msg-group ai'},React.createElement('div',{className:'msg-label'},'Axon'),React.createElement('div',{className:'msg-bubble'},React.createElement('div',{className:'spinner'}))),
        React.createElement('div',{ref:bottomRef})
      ),
      // ── Save panel (shown when toggled) ──
      showSavePanel&&React.createElement('div',{className:'save-panel'},
        React.createElement('div',{className:'save-panel-title'},'Save research to vault'),
        React.createElement('div',{className:'save-panel-row'},
          React.createElement('select',{

          ),
          React.createElement('button',{
            className:'save-panel-btn',

        ),

        ),
        React.createElement('div',{className:'ask-hint'},'Enter to send · Shift+Enter for new line')

/* ── StatsView ── */
function StatsView({files,actionTodos,vaultHandle}){
  const totalWords=files.reduce((s,f)=>s+f.content.split(/\s+/).length,0);
  const totalLinks=files.reduce((s,f)=>s+f.backlinks.length,0);
  const avgWords=files.length?Math.round(totalWords/files.length):0;
  const readMins=Math.round(totalWords/250);

  const todayCount=actionTodos.filter(t=>t.bucket===TODAY&&!t.checked).length;
  const weekCount=actionTodos.filter(t=>t.bucket===WEEK&&!t.checked).length;
  const somedayCount=actionTodos.filter(t=>t.bucket===SOMEDAY&&!t.checked).length;
  const doneCount=actionTodos.filter(t=>t.checked||t.bucket===DONE).length;
  const totalTasks=todayCount+weekCount+somedayCount+doneCount;
  const completionPct=totalTasks>0?Math.round(doneCount/totalTasks*100):0;

  // Folder breakdown
  const folderCounts={};
  files.forEach(f=>{const k=f.folder||'root';folderCounts[k]=(folderCounts[k]||0)+1;});
  const topFolders=Object.entries(folderCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxFC=topFolders[0]?.[1]||1;
  const folderColors=['var(--accent)','var(--teal)','var(--purple)','#e8a030','var(--red)','#a78bfa','var(--green)','var(--accent2)'];

  // Most linked
  const linkMap={};
  files.forEach(f=>f.backlinks.forEach(bl=>{linkMap[bl]=(linkMap[bl]||0)+1;}));
  const topLinked=Object.entries(linkMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxLinks=topLinked[0]?.[1]||1;

  // Longest notes
  const topByWords=[...files].sort((a,b)=>b.content.split(/\s+/).length-a.content.split(/\s+/).length).slice(0,5);

  // SVG donut for tasks
  const donutData=[
    {label:'Today',val:todayCount,color:'var(--accent)'},
    {label:'This Week',val:weekCount,color:'var(--teal)'},
    {label:'Someday',val:somedayCount,color:'var(--purple)'},
    {label:'Done',val:doneCount,color:'var(--green)'},
  ].filter(d=>d.val>0);
  const donutTotal=donutData.reduce((s,d)=>s+d.val,0)||1;
  const donutR=44,donutCx=56,donutCy=56,donutStroke=14;
  const donutCircumference=2*Math.PI*donutR;
  let donutOffset=0;
  const donutSlices=donutData.map(d=>{
    const pct=d.val/donutTotal;
    const dasharray=`${pct*donutCircumference} ${donutCircumference}`;
    const slice={...d,dasharray,offset:donutOffset};
    donutOffset+=pct*donutCircumference;
    return slice;
  });

  // Word count sparkline — distribute files into 10 buckets by word count
  const sparkMax=Math.max(...files.map(f=>f.content.split(/\s+/).length),1);
  const bucketCount=16;
  const buckets=Array(bucketCount).fill(0);
  files.forEach(f=>{
    const wc=f.content.split(/\s+/).length;
    const b=Math.min(bucketCount-1,Math.floor((wc/sparkMax)*(bucketCount-1)));
    buckets[b]++;
  });
  const maxBucket=Math.max(...buckets,1);

  return React.createElement('div',{className:'stats-view-wrap'},

    // ── KPI row ──
    React.createElement('div',{className:'stats-kpi-row'},
      React.createElement('div',{className:'stats-kpi'},
        React.createElement('div',{className:'stats-kpi-val'},files.length.toLocaleString()),
        React.createElement('div',{className:'stats-kpi-label'},'Notes'),
        React.createElement('div',{className:'stats-kpi-sub'},`${totalWords.toLocaleString()} words`)
      ),
      React.createElement('div',{className:'stats-kpi'},
        React.createElement('div',{className:'stats-kpi-val'},avgWords.toLocaleString()),
        React.createElement('div',{className:'stats-kpi-label'},'Avg words / note'),
        React.createElement('div',{className:'stats-kpi-sub'},`${readMins} min read`)
      ),
      React.createElement('div',{className:'stats-kpi'},
        React.createElement('div',{className:'stats-kpi-val'},totalLinks.toLocaleString()),
        React.createElement('div',{className:'stats-kpi-label'},'Backlinks'),
        React.createElement('div',{className:'stats-kpi-sub'},`${(totalLinks/Math.max(files.length,1)).toFixed(1)} avg / note`)
      ),
      React.createElement('div',{className:'stats-kpi'},
        React.createElement('div',{className:'stats-kpi-val'},completionPct+'%'),
        React.createElement('div',{className:'stats-kpi-label'},'Task completion'),
        React.createElement('div',{className:'stats-kpi-sub'},`${doneCount} done · ${todayCount+weekCount} open`)
      )
    ),

    // ── Row 1: Folder breakdown + Task donut ──
    React.createElement('div',{className:'stats-row'},

      // Folder bar chart
      React.createElement('div',{className:'stats-panel'},
        React.createElement('div',{className:'stats-panel-title'},'Notes by folder'),
        topFolders.length===0
          ?React.createElement('div',{style:{fontSize:13,color:'var(--text3)'}},`No folders found.`)
          :topFolders.map(([folder,count],i)=>
            React.createElement('div',{key:folder,className:'stats-bar-row'},
              React.createElement('div',{className:'stats-bar-label',title:folder},folder),
              React.createElement('div',{className:'stats-bar-track'},
                React.createElement('div',{className:'stats-bar-fill',style:{width:`${Math.round(count/maxFC*100)}%`,background:folderColors[i%folderColors.length]}})
              ),
              React.createElement('div',{className:'stats-bar-count'},count)
            )
          )
      ),

      // Task donut
      React.createElement('div',{className:'stats-panel'},
        React.createElement('div',{className:'stats-panel-title'},'Tasks'),
        React.createElement('div',{className:'stats-donut'},
          React.createElement('svg',{width:112,height:112,viewBox:'0 0 112 112',style:{flexShrink:0,transform:'rotate(-90deg)'}},
            React.createElement('circle',{cx:donutCx,cy:donutCy,r:donutR,fill:'none',stroke:'var(--bg4)',strokeWidth:donutStroke}),
            donutTotal===0
              ?null
              :donutSlices.map((s,i)=>React.createElement('circle',{
                key:i,cx:donutCx,cy:donutCy,r:donutR,fill:'none',
                stroke:s.color,strokeWidth:donutStroke,
                strokeDasharray:s.dasharray,
                strokeDashoffset:-s.offset,
                style:{transition:'stroke-dasharray .4s ease'}
              }))
          ),
          React.createElement('div',{className:'stats-donut-legend'},
            donutData.map(d=>React.createElement('div',{key:d.label,className:'stats-legend-row'},
              React.createElement('div',{className:'stats-legend-dot',style:{background:d.color}}),
              React.createElement('span',null,d.label),
