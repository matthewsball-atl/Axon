function CaptureModal({files,apiKey,vaultFolders,actionTodos,onClose,onAddTodo,onSaveNote,vaultHandle}){
  const[text,setText]=useState('');
  const[mode,setMode]=useState(''); // 'task'|'note'|'draft'|''
  const[bucket,setBucket]=useState('today');
  const[folder,setFolder]=useState(vaultFolders[0]||'');
  const[draft,setDraft]=useState('');
  const[generating,setGenerating]=useState(false);
  const[success,setSuccess]=useState('');
  const[copying,setCopying]=useState(false);
  const inputRef=useRef(null);
  const TODAY='today',WEEK='week',SOMEDAY='someday';

  useEffect(()=>{
    setTimeout(()=>inputRef.current?.focus(),50);
  },[]);

  // Auto-classify as user types
  useEffect(()=>{
    if(!text.trim()){setMode('');return;}
    const t=text.trim().toLowerCase();
    // Draft signals: starts with write/draft/create/compose/summarise/generate
    if(/^(write|draft|create|compose|generate|summarise|summarize|help me write|help me draft)/i.test(text.trim())){
      setMode('draft');return;
    }
    // Task signals: short + imperative verbs, or ends with ?/!
    const words=t.split(/\s+/);
    if(words.length<=8||/^(review|update|follow up|schedule|send|call|email|prep|fix|finish|complete|check|ask|meet|book|remind)/i.test(t)){
      setMode('task');return;
    }
    // Default: note
    setMode('note');
  },[text]);

  const modeIcon={'task':'◈','note':'📋','draft':'✍','':'+'}[mode]||'+';

  const generateDraft=useCallback(async()=>{
    if(!apiKey||!text.trim())return;
    setGenerating(true);setDraft('');
    try{
      // Find relevant vault context
      const ql=text.toLowerCase();
      const relevant=files
        .map(f=>{let sc=0;f.content.toLowerCase().split(/\s+/).forEach(w=>{if(ql.includes(w)&&w.length>4)sc++;});if(f.title.toLowerCase().split(/\s+/).some(w=>ql.includes(w)))sc+=10;return{...f,sc};})
        .filter(f=>f.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,4);
      const ctx=relevant.map(f=>`# ${f.title}\n${f.content.slice(0,800)}`).join('\n\n---\n\n');
      const res=await safeFetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1200,
          messages:[{role:'user',content:`You are a writing assistant for Matt Ball, VP of R&D at Progressive Leasing. Write in his voice: direct, analytical, authoritative but not arrogant. He writes for LinkedIn, board memos, whitepapers, and strategy docs.\n\nRequest: ${text}\n\n${ctx?`Relevant vault context:\n${ctx}`:'No specific vault context found — write from general knowledge.'}\n\nOutput only the content, no preamble.`}]
        })
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      setDraft(data.content?.[0]?.text||'');
    }catch(e){setDraft(`Error: ${e.message}`);}
    setGenerating(false);
  },[text,apiKey,files]);

  const handleKeyDown=useCallback(e=>{
    if(e.key==='Escape'){onClose();return;}
    if(e.key==='Enter'&&!e.shiftKey&&mode==='task'){
      e.preventDefault();
      if(text.trim()){
        onAddTodo&&onAddTodo({text:text.trim(),bucket});
        setSuccess('Task added to '+bucket);
        setTimeout(()=>{setText('');setMode('');setSuccess('');},1200);
      }
    }
  },[mode,text,bucket,onClose,onAddTodo]);

  const saveNote=useCallback(async()=>{
    if(!text.trim()||!vaultHandle)return;
    const slug=sanitizeName(text.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')).slice(0,50)||'note';
    const filename=`${new Date().toISOString().slice(0,10)}-${slug}.md`;
    const md=`# ${text.trim()}\n\n_Captured ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}_\n\n`;
    try{
      const pathParts=folder&&folder!=='__root__'?folder.split('/'):[];
      let dirHandle=vaultHandle;
      for(const part of pathParts){dirHandle=await dirHandle.getDirectoryHandle(part,{create:true});}
      const fh=await dirHandle.getFileHandle(filename,{create:true});
      const w=await fh.createWritable();await w.write(md);await w.close();
      setSuccess(`Saved to ${folder||'vault root'}`);
      onSaveNote&&onSaveNote();
      setTimeout(()=>{setText('');setMode('');setSuccess('');},1500);
    }catch(e){setSuccess('Error: '+e.message);}
  },[text,folder,vaultHandle,onSaveNote]);

  const saveDraft=useCallback(async()=>{
    if(!draft||!vaultHandle)return;
    const slug=sanitizeName(text.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')).slice(0,50)||'note';
    const filename=`${new Date().toISOString().slice(0,10)}-draft-${slug}.md`;
    try{
      const pathParts=folder&&folder!=='__root__'?folder.split('/'):[];
      let dirHandle=vaultHandle;
      for(const part of pathParts){dirHandle=await dirHandle.getDirectoryHandle(part,{create:true});}
      const fh=await dirHandle.getFileHandle(filename,{create:true});
      const w=await fh.createWritable();await w.write(`# ${text.trim()}\n\n${draft}`);await w.close();
      setSuccess('Draft saved to vault');
      onSaveNote&&onSaveNote();
      setTimeout(onClose,1500);
    }catch(e){setSuccess('Error: '+e.message);}
  },[draft,text,folder,vaultHandle,onSaveNote]);

  const copyDraft=useCallback(()=>{
    navigator.clipboard.writeText(draft);
    setCopying(true);
    setTimeout(()=>setCopying(false),1500);
  },[draft]);

  return React.createElement('div',{className:'capture-overlay',onClick:e=>{if(e.target.className==='capture-overlay')onClose();}},
    React.createElement('div',{className:'capture-modal'},
      // Input row
      React.createElement('div',{className:'capture-input-row'},
        React.createElement('span',{className:'capture-icon'},modeIcon),
        React.createElement('textarea',{
          ref:inputRef,
          className:'capture-input',
          value:text,
          onChange:e=>{setText(e.target.value);e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';},
          onKeyDown:handleKeyDown,
          placeholder:'Capture a task, note, or start with "write…" to compose',
          rows:1
        })
      ),
      // Mode selector
      text.trim()&&React.createElement('div',{className:'capture-type-bar'},
        React.createElement('span',{style:{fontSize:11,color:'var(--text3)',marginRight:4}},'Type:'),
        ['task','note','draft'].map(m=>React.createElement('button',{
          key:m,className:`capture-type-chip ${mode===m?'active-'+m:''}`,
          onClick:()=>setMode(m)
        },m))
      ),
      // Mode-specific body
      React.createElement('div',{className:'capture-body'},
        success
          ?React.createElement('div',{className:'capture-success'},'✓ '+success)
          :mode==='task'
            ?React.createElement('div',{className:'capture-task-buckets'},
              [['today','Today','var(--accent)'],['week','This Week','var(--teal)'],['someday','Someday','var(--purple)']].map(([key,label,color])=>
                React.createElement('button',{
                  key,
                  className:`capture-bucket-btn ${bucket===key?'selected':''}`,
                  style:bucket===key?{borderColor:color,color,background:`${color}18`}:{},
                  onClick:()=>setBucket(key)
                },label)
              )
            )
            :mode==='note'
              ?React.createElement('div',{className:'capture-folder-row'},
                React.createElement('select',{className:'capture-folder-sel',value:folder,onChange:e=>setFolder(e.target.value)},
                  React.createElement('option',{value:''},'Vault root'),
                  vaultFolders.map(f=>React.createElement('option',{key:f,value:f},f))
                ),
                React.createElement('button',{className:'capture-action-btn',onClick:saveNote,disabled:!text.trim()},'Save Note')
              )
              :mode==='draft'
                ?React.createElement('div',{className:'capture-draft-area'},
                  !draft&&!generating&&React.createElement('div',{className:'capture-folder-row'},
                    React.createElement('select',{className:'capture-folder-sel',value:folder,onChange:e=>setFolder(e.target.value)},
                      React.createElement('option',{value:''},'Vault root'),
                      vaultFolders.map(f=>React.createElement('option',{key:f,value:f},f))
                    ),
                    React.createElement('button',{className:'capture-action-btn',onClick:generateDraft,disabled:generating||!text.trim()||!apiKey},'Generate Draft')
                  ),
                  generating&&React.createElement('div',{className:'capture-generating'},React.createElement('div',{className:'spinner'}),`Writing in your voice using ${files.length} vault notes as context…`),
                  draft&&React.createElement(React.Fragment,null,
                    React.createElement('div',{className:'capture-draft-output'},draft),
                    React.createElement('div',{className:'capture-draft-actions'},
                      React.createElement('button',{className:'capture-action-btn',onClick:saveDraft},'Save to Vault'),
                      React.createElement('button',{className:'capture-secondary-btn',onClick:copyDraft},copying?'Copied!':'Copy to Clipboard'),
                      React.createElement('button',{className:'capture-secondary-btn',onClick:()=>{setDraft('');}},'Regenerate')
                    )
                  )
                )
                :mode===''&&React.createElement('div',{style:{fontSize:12,color:'var(--text3)',lineHeight:1.7}},
                  'Start typing to capture. Short phrases become tasks. Longer text becomes notes. Start with "write…" to compose.')
      ),
      // Footer
      React.createElement('div',{className:'capture-footer'},
        React.createElement('div',{className:'capture-hint'},'Esc to close · Enter to add task · Cmd+Shift+C to toggle'),
        mode==='task'&&!success&&text.trim()&&React.createElement('button',{
          className:'capture-action-btn',
          onClick:()=>{onAddTodo&&onAddTodo({text:text.trim(),bucket});setSuccess('Task added to '+bucket);setTimeout(()=>{setText('');setMode('');setSuccess('');},1200);}
        },'Add Task →')
      )
    )
  );
}

/* ══════════════════════════════════════════════
   AXON INDEX SYSTEM
   index/axon-index.json — two-layer retrieval
   ══════════════════════════════════════════════ */

const INDEX_PATH='axon-index.json';
const INDEX_FOLDER='index';
const INDEX_BATCH=5; // files per summarization API call

async function getOrCreateIndexHandle(vaultHandle){
  const indexDir=await vaultHandle.getDirectoryHandle(INDEX_FOLDER,{create:true});
  const indexFile=await indexDir.getFileHandle(INDEX_PATH,{create:true});
  return{indexDir,indexFile};
}

async function loadIndex(vaultHandle){
  try{
    const{indexFile}=await getOrCreateIndexHandle(vaultHandle);
    const f=await indexFile.getFile();
    const text=await f.text();
    if(!text.trim())return[];
    try{return JSON.parse(text);}catch(e){console.warn('Index parse failed, resetting:',e);return[];}
  }catch(e){return[];}
}

async function saveIndex(vaultHandle,index){
  try{
    const{indexFile}=await getOrCreateIndexHandle(vaultHandle);
    const w=await indexFile.createWritable();
    await w.write(JSON.stringify(index,null,2));
    await w.close();
  }catch(e){console.error('Index save failed:',e);}
}

async function summariseFiles(files,apiKey){
  if(!apiKey||!files.length)return[];
  const fileList=files.map((f,i)=>`File ${i+1}: ${f.path}\nTitle: ${f.title}\n\n${f.content.slice(0,1500)}`).join('\n\n---\n\n');
  try{
    const res=await safeFetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:`For each file below, write a precise 1-2 sentence semantic summary capturing the core concept. Be specific — avoid generic phrases like "this document discusses". Focus on what makes this note distinct and searchable.

${fileList}

Respond ONLY with a JSON array, one entry per file in order:
[{"path":"...","summary":"..."}]`}]
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content?.[0]?.text||'[]';
    const clean=text.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    try{return JSON.parse(clean);}catch(e){console.warn('Summarise parse failed:',e);return files.map(f=>({path:f.path,summary:f.excerpt||f.title}));}
  }catch(e){
    console.error('Summarisation error:',e);
    return files.map(f=>({path:f.path,summary:f.excerpt||f.title}));
  }
}

async function buildIndexEntries(files,apiKey,onProgress){
  const entries=[];
  for(let i=0;i<files.length;i+=INDEX_BATCH){
    const batch=files.slice(i,i+INDEX_BATCH);
    onProgress&&onProgress(i,files.length);
    const summaries=await summariseFiles(batch,apiKey);
    batch.forEach((f,j)=>{
      entries.push({
        path:f.path,
        title:f.title,
        folder:f.folder,
        summary:summaries[j]?.summary||f.excerpt||f.title,
        backlinks:f.backlinks,
        wordCount:f.content.split(/\s+/).length,
        indexed:new Date().toISOString()
      });
    });
  }
  onProgress&&onProgress(files.length,files.length);
  return entries;
}

// Score a file against a query using index entry (no full content needed)
function scoreIndexEntry(entry,query){
  const ql=query.toLowerCase();
  const words=ql.split(/\s+/).filter(w=>w.length>2);
  let sc=0;
  if(entry.title.toLowerCase().includes(ql))sc+=20;
  if(entry.path.toLowerCase().includes(ql))sc+=10;
  if(entry.summary.toLowerCase().includes(ql))sc+=8;
  words.forEach(w=>{
    if(entry.title.toLowerCase().includes(w))sc+=5;
    if(entry.summary.toLowerCase().includes(w))sc+=3;
    if(entry.folder.toLowerCase().includes(w))sc+=2;
  });
  return sc;
}

// Build context for chat using two-layer retrieval
function buildTwoLayerCtx(files,index,query,folderFilter){
  // Filter by folder if set
  const filteredFiles=folderFilter.length===0
    ?files
    :files.filter(f=>folderFilter.includes(f.folder));

  const filteredIndex=folderFilter.length===0
    ?index
    :index.filter(e=>folderFilter.includes(e.folder));

  // Layer 1: index manifest (always included — titles + summaries only)
  const manifest=filteredIndex.length>0
    ?filteredIndex.map(e=>`[${e.path}] ${e.title}: ${e.summary}`).join('\n')
    :filteredFiles.map(f=>`[${f.path}] ${f.title}: ${f.excerpt}`).join('\n');

  // Layer 2: score and pull full content for top matches
  const scored=filteredIndex.length>0
    ?filteredIndex.map(e=>({...e,sc:scoreIndexEntry(e,query)})).sort((a,b)=>b.sc-a.sc)
    :filteredFiles.map(f=>({path:f.path,sc:10}));

  const topPaths=new Set(scored.slice(0,6).map(e=>e.path));
  const topFiles=filteredFiles.filter(f=>topPaths.has(f.path));

  // Cap each file at 2000 words (~2700 tokens) to prevent token explosion
  const MAX_WORDS=2000;
  const truncate=(text)=>{const words=text.split(/\s+/);return words.length>MAX_WORDS?words.slice(0,MAX_WORDS).join(' ')+'\n\n[… truncated]':text;};
  const fullContent=topFiles.map(f=>`# ${f.title}\nPath: ${f.path}\n\n${truncate(f.content)}`).join('\n\n---\n\n');

  return{manifest,fullContent,totalFiles:filteredFiles.length};
}

> *Your knowledge, alive.*

Axon is a local-first personal knowledge management app that runs entirely in your browser — no server, no cloud sync, no account required. It connects directly to a folder of markdown files on your computer and turns them into a searchable, AI-powered knowledge base.

---

## What Axon Does

Axon is built around four ideas:

**Your files stay yours.** Everything lives in a folder on your machine. Axon reads and writes markdown files directly using the browser's File System Access API. There is no database, no proprietary format, no lock-in. If you stop using Axon, your notes are still just markdown files.

**Structure emerges from content.** Axon scans your vault on connect, extracts titles, backlinks, headings, and excerpts, and builds a live index. The more content you add, the more useful the connections become.

**AI is a tool, not the product.** Axon uses an LLM API for specific jobs: answering questions about your vault, converting imported documents to markdown, generating daily education cards, and rewriting reminders into action items. You bring your own API key. Axon never sends your content anywhere except the configured LLM API when you explicitly trigger an AI feature.

**Capture first, organise later.** The \`+\` button and the reminders file are designed for zero-friction capture. Drop a thought in reminders.md from your phone or another device, and it shows up in your Today list when you open Axon.

## Features

### Browse
The home view when your vault is connected. Shows open actions, a daily education carousel generated from your topic list, most-referenced notes, and recently added content. Click any note to read it. Click **✎ Edit** to open it in the rich editor.

### Chat
Ask questions about your vault. Axon uses a two-layer retrieval system: a compact index manifest of all notes is always in context, and the most relevant full files are pulled in based on your query. Use the context folder selector in the sidebar to narrow the scope and reduce token cost.

After a productive conversation, click **"◈ Save research to vault"** to synthesise the entire thread into a clean markdown document and save it to any folder.

### Actions
A three-column task board: Today, This Week, Someday. Tasks persist to \`items.md\` in your Actions folder. Click any task text to edit it inline. Use the **Capture** button (\`+\` in the topbar) from any screen to add tasks instantly.

### Import
Drop files into your Imports folder and convert them to markdown. Markdown files are copied directly with no API call. PDFs, DOCX, PPTX, and XLSX files are converted via the LLM API. Converted files are added to the vault index immediately.

### Capture & Compose
The \`+\` button in the topbar opens a quick-capture modal from any screen. Type anything:
- **Short imperative phrases** → classified as tasks, routed to Actions
- **Longer text** → classified as notes, saved to a vault folder you choose
- **"Write…" / "Draft…"** → Claude generates a draft in your voice using your vault as context, which you can save or copy

### Daily Education
A carousel on the Browse landing page. Each card covers one of your configured topics with a 2–3 sentence insight and an **"Explore in Chat →"** button that opens a pre-seeded conversation. Cards are generated once per day (refreshing after 6am). Configure topics in **Settings → Education**.

### Reminders
Point Axon at a \`reminders.md\` file (Settings → Directories → Reminders File). Add anything to that file — bullets, checkboxes, numbered lists, or freeform lines. When Axon loads or you open the Actions tab, items are rewritten as concise action titles by Claude and added to your Today list. The reminders file is then cleared, ready for your next batch.

### Rich Editor
Click **✎ Edit** on any note, or use the \`+\` button on any sidebar folder to create a new file. The editor has a markdown toolbar (bold, italic, headings, lists, code blocks, blockquotes) and supports three layout modes: **split** (write and preview side by side), **write** (editor only), **preview** (rendered only). Set your preferred mode in Settings → Appearance. Save with \`Cmd+S\` or the Save button.

## Technical Notes

**Browser requirement:** Google Chrome (or Chromium-based browsers). The File System Access API (\`showDirectoryPicker\`, \`createWritable\`) is not supported in Firefox or Safari.

**Data storage:** All persistent data lives in your file system. The only things stored in the browser's \`localStorage\` are your API key, theme preference, editor layout preference, education topics, and the daily education card cache.

**Index:** \`index/axon-index.json\` is auto-generated and auto-maintained. It stores a semantic summary, title, folder, backlinks, and word count for every markdown file. Updated incrementally after each import and rebuilt fully when Claude Code compiles your wiki. Do not edit it manually.

**Security:** Axon sanitizes all markdown output with DOMPurify before rendering. File and folder names are sanitized to prevent path traversal. All API calls are routed through a fetch guard that enforces the configured provider's API domain. Your API key is validated for format before storage.

**Token costs:** The two-layer chat retrieval system keeps token costs roughly constant as your vault grows. The index manifest (titles and summaries) is ~3–5K tokens regardless of vault size. Full file content is only loaded for the top 6 most relevant matches per query.

async function scaffoldAxon(onProgress){
  try{
    // 1. User picks where Axon folder lives
    onProgress('Choose where to create your Axon folder…');
    const parentDir=await window.showDirectoryPicker({mode:'readwrite'});

    onProgress('Creating Axon directory structure…');

    // 2. Create Axon root
    const axonRoot=await parentDir.getDirectoryHandle('Axon',{create:true});

    // 3. Create Content/
    const contentDir=await axonRoot.getDirectoryHandle('Content',{create:true});

    // 4. Create Content/Actions/ + items.md
    const actionsDir=await contentDir.getDirectoryHandle('Actions',{create:true});
    const itemsFh=await actionsDir.getFileHandle('items.md',{create:true});
    const itemsW=await itemsFh.createWritable();
    await itemsW.write('# Items\n\n## Today\n\n## This Week\n\n## Someday\n\n## Done\n');
    await itemsW.close();

    // 5. Create Chats/
    await axonRoot.getDirectoryHandle('Chats',{create:true});

    // 6. Create Imports/
    await axonRoot.getDirectoryHandle('Imports',{create:true});

    // 7. Create reminders.md under Content/ with first task
    const remindersFh=await contentDir.getFileHandle('reminders.md',{create:true});
    const remindersW=await remindersFh.createWritable();
    await remindersW.write('- Get familiar with Axon!\n');
    await remindersW.close();

    // 8. Write README.md to Axon root
    const readmeFh=await axonRoot.getFileHandle('README.md',{create:true});
    const readmeW=await readmeFh.createWritable();
    await readmeW.write(AXON_README);
    await readmeW.close();

    onProgress('Done!');
    return{axonRoot,contentDir,actionsDir,remindersFh};
  }catch(e){
    if(e.name==='AbortError')return null;
    throw e;
  }
}

/* ── Reminders system ── */
function parseReminderItems(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const items=[];
  for(const line of lines){
    // Skip heading lines
    if(/^#{1,6}\s/.test(line))continue;
    // Strip bullets: - item, * item, + item
    let item=line.replace(/^[-*+]\s+/,'');
    // Strip checkboxes: - [ ] item, - [x] item
    item=item.replace(/^\[[ xX]\]\s*/,'');
    // Strip enumeration: 1. item, 1) item
    item=item.replace(/^\d+[.)]\s+/,'');
    // Strip > blockquote
    item=item.replace(/^>\s*/,'');
    item=item.trim();
    if(item.length>1)items.push(item);
  }
  return items;
}

async function processReminders(remindersHandle,actionsHandle,apiKey,onDone){
  try{
    // Read reminders file
    const file=await remindersHandle.getFile();
    const text=await file.text();
    const raw=parseReminderItems(text);
    if(!raw.length)return;

    // Use Claude to rewrite as clean action-oriented titles
    let tasks=raw;
    if(apiKey){
      try{
        const res=await safeFetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({
            model:'claude-sonnet-4-20250514',
            max_tokens:500,
            messages:[{role:'user',content:`Convert each of the following reminders into a concise, action-oriented task title. Use imperative verbs. Be specific but brief (under 10 words each). Preserve all meaning.

Reminders:
${raw.map((r,i)=>`${i+1}. ${r}`).join('\n')}

Respond ONLY with a JSON array of strings, one per reminder, in the same order:
["task 1","task 2"]`}]
          })
        });
        const data=await res.json();
        if(!data.error){
          const t=data.content?.[0]?.text||'[]';
          let parsed;try{parsed=JSON.parse(t.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim());}catch(e){parsed=null;}
          if(Array.isArray(parsed)&&parsed.length===raw.length)tasks=parsed;
        }
      }catch(e){console.warn('Reminder rewrite failed, using raw:',e);}
    }

    // Read existing items.md and append tasks to Today
    for await(const[name,handle]of actionsHandle.entries()){
      if(handle.kind==='file'&&name.toLowerCase()==='items.md'){
        const f=await handle.getFile();
        const existing=await f.text();
        const todos=parseTodos(existing);
        const now=new Date().toISOString();
        const newTodos=tasks.map((t,i)=>({
          id:Date.now()+i,
          bucket:'today',
          checked:false,
          text:t.trim(),
          doneDate:''
        }));
        const updated=[...todos,...newTodos];
        const w=await handle.createWritable();
        await w.write(serialiseTodos(updated));
        await w.close();

        // Clear reminders file
        const rw=await remindersHandle.createWritable();
        await rw.write('');
        await rw.close();

        onDone&&onDone(tasks.length);
        return;
      }
    }
  }catch(e){console.error('processReminders error:',e);}
}

    const idx=await loadIndex(dir);

    setVaultIndex(idx);
    // Always use the ref so we get the latest apiKey value
    const key=apiKeyRef.current;
    if(triggerIndex&&key){
      const indexedPaths=new Set(idx.map(e=>e.path));
      const missing=loaded.filter(f=>!indexedPaths.has(f.path)&&!f.path.startsWith('index/')&&!f.path.startsWith('chats/'));
      if(missing.length>0){
        setIndexStatus(`Indexing ${missing.length} note${missing.length!==1?'s':''}…`);
        const newEntries=await buildIndexEntries(missing,key,(done,total)=>{
          setIndexStatus(`Indexing ${done}/${total}…`);
        });
        const merged=[...idx,...newEntries];
        vaultIndexRef.current=merged;
        setVaultIndex(merged);
        await saveIndex(dir,merged);
        setIndexStatus('');
      }
    }
  },[]);

  useEffect(()=>{if(!actionsHandle)return;(async()=>{try{for await(const[name,handle]of actionsHandle.entries()){if(handle.kind==='file'&&name.toLowerCase()==='items.md'){const f=await handle.getFile();setActionTodos(parseTodos(await f.text()));return;}}}catch(e){}})();},[actionsHandle]);

  // Process reminders when both actionsHandle and remindersHandle are available
  useEffect(()=>{
    if(!actionsHandle||!remindersHandle)return;
    processReminders(remindersHandle,actionsHandle,apiKey,(count)=>{
      if(count>0){
        setRemindersToast(`${count} reminder${count!==1?'s':''} added to Today`);
        // Reload action todos
        (async()=>{try{for await(const[name,handle]of actionsHandle.entries()){if(handle.kind==='file'&&name.toLowerCase()==='items.md'){const f=await handle.getFile();setActionTodos(parseTodos(await f.text()));return;}}}catch(e){}})();
        setTimeout(()=>setRemindersToast(''),4000);
      }
    });
  },[actionsHandle,remindersHandle]);

  const openVault=async()=>{
    try{
      const dir=await window.showDirectoryPicker({mode:'readwrite'});

      // Helpers — silent fail, try multiple name variants
      const tryDir=async(parent,...names)=>{
        for(const n of names){try{return await parent.getDirectoryHandle(n,{create:false});}catch(e){}}
        return null;
      };
      const tryFile=async(parent,...names)=>{
        for(const n of names){try{return await parent.getFileHandle(n,{create:false});}catch(e){}}
        return null;
      };

      let vaultDir=dir;
      let actions=null,chats=null,imports=null,reminders=null;
      const detected=[];

      // ── Strategy A: user picked Axon root (has Content/ inside) ──
      const contentDir=await tryDir(dir,'Content','content');
      if(contentDir){
        vaultDir=contentDir;
        detected.push('Content/ → vault');
        // Actions lives inside Content/Actions/
        actions=await tryDir(contentDir,'Actions','actions');
        if(actions)detected.push('Actions');
        // Chats and Imports are siblings of Content/ under Axon root
        chats=await tryDir(dir,'Chats','chats');
        if(chats)detected.push('Chats');
        imports=await tryDir(dir,'Imports','imports','Downloads','downloads');
        if(imports)detected.push('Imports');
        // reminders.md lives inside Content/
        reminders=await tryFile(contentDir,'reminders.md','Reminders.md');
        if(reminders)detected.push('reminders.md');
      } else {
        // ── Strategy B: user picked vault directly (Content/ or any markdown folder) ──
        // Look for Axon-style structure inside it
        actions=await tryDir(dir,'Actions','actions');
        if(actions)detected.push('Actions');
        chats=await tryDir(dir,'Chats','chats');
        if(chats)detected.push('Chats');
        imports=await tryDir(dir,'Imports','imports','Downloads','downloads');
        if(imports)detected.push('Imports');
        reminders=await tryFile(dir,'reminders.md','Reminders.md');
        if(reminders)detected.push('reminders.md');
      }

      // Apply all detected handles
      setVaultHandle(vaultDir);
      if(actions)setActionsHandle(actions);
      if(chats)setChatsHandle(chats);
      if(imports)setDownloadsHandle(imports);
      if(reminders)setRemindersHandle(reminders);

      // Show connect toast
      if(detected.length>0){
        setConnectToast('◈ Connected — auto-detected: '+detected.join(', '));
        setTimeout(()=>setConnectToast(''),5000);
      }

      await scanVault(vaultDir,null,true);
      setActiveFile(null);
    }catch(e){if(e.name!=='AbortError')console.error(e);}
  };
  const pickActions=async()=>{try{const dir=await window.showDirectoryPicker({mode:'readwrite'});setActionsHandle(dir);}catch(e){if(e.name!=='AbortError')console.error(e);}};
  const pickDownloads=async()=>{try{const dir=await window.showDirectoryPicker({mode:'readwrite'});setDownloadsHandle(dir);}catch(e){if(e.name!=='AbortError')console.error(e);}};
  const pickChats=async()=>{try{const dir=await window.showDirectoryPicker({mode:'readwrite'});setChatsHandle(dir);}catch(e){if(e.name!=='AbortError')console.error(e);}};
  const pickReminders=async()=>{
    try{
      // Use file picker for a specific file
      const[handle]=await window.showOpenFilePicker({
        types:[{description:'Markdown or text files',accept:{'text/*':['.md','.txt','.markdown']}}],
        multiple:false
      });
      setRemindersHandle(handle);
      // useEffect will fire and process reminders when handle is set
    }catch(e){if(e.name!=='AbortError')console.error(e);}
  };

  const navigate=f=>{setActiveFile(f);setEditingFile(null);setEditingHandle(null);setTab('browse');};
  const openEditor=(f,handle)=>{setEditingFile(f);setEditingHandle(handle||null);setActiveFile(f);setTab('browse');};
  const onNewFileCreated=useCallback(async(path,fh)=>{
    // Build a minimal file object for the editor
    const fileObj={path,title:path.split('/').pop().replace(/\.md$/,''),content:'',folder:path.includes('/')?path.split('/').slice(0,-1).join('/'):'',backlinks:[],excerpt:''};
    setEditingFile(fileObj);setEditingHandle(fh);setActiveFile(fileObj);setTab('browse');
    await scanVault(vaultHandle,apiKey,false);
  },[vaultHandle,apiKey,scanVault]);
  const captureAddTodo=useCallback(({text,bucket})=>{
    // Write directly to actionsHandle items.md
    if(!actionsHandle)return;
    (async()=>{
      try{
        for await(const[name,handle]of actionsHandle.entries()){
          if(handle.kind==='file'&&name.toLowerCase()==='items.md'){
            const f=await handle.getFile();
            const existing=await f.text();
            const todos=parseTodos(existing);
            const newTodo={id:Date.now(),bucket,checked:false,text:text.trim(),doneDate:''};
            const updated=[...todos,newTodo];
            const w=await handle.createWritable();
            await w.write(serialiseTodos(updated));
            await w.close();
            setActionTodos(updated);
            return;
          }
        }
      }catch(e){console.error('Capture todo error:',e);}
    })();
  },[actionsHandle]);
  const handleSetupComplete=useCallback(async(result)=>{
    if(!result)return;
    // Auto-connect vault to the Content directory
    const{axonRoot,contentDir,actionsDir,remindersFh}=result;
    setVaultHandle(contentDir);
    await scanVault(contentDir,apiKey,true);
    setActiveFile(null);
    // Auto-wire Actions
    setActionsHandle(actionsDir);
    // Auto-wire Chats
    try{const ch=await axonRoot.getDirectoryHandle('Chats',{create:false});setChatsHandle(ch);}catch(e){}
    // Auto-wire Imports
    try{const imp=await axonRoot.getDirectoryHandle('Imports',{create:false});setDownloadsHandle(imp);}catch(e){}
    // Auto-wire Reminders
    setRemindersHandle(remindersFh);
  },[apiKey,scanVault]);

  const openEduChat=useCallback((card)=>{
    setPendingChatPrompt({topic:card.topic,prompt:card.prompt||`Tell me more about ${card.topic}. ${card.teaser}`});
    setTab('chat');
    if(vaultHandle)scanVault(vaultHandle);
  },[vaultHandle,scanVault]);
  const handleSearch=q=>{setSearch(q);if(q&&tab!=='search')setTab('search');if(!q&&tab==='search')setTab('browse');};
  const rescan=useCallback((triggerIdx=false)=>{const h=vaultHandleRef.current;if(h)scanVault(h,null,triggerIdx);},[scanVault]);
  const sidebarRescan=useCallback(async()=>{
    const handle=vaultHandleRef.current;
    if(!handle||sidebarRefreshing)return;
    setSidebarRefreshing(true);
    await scanVault(handle,null,true);
    setSidebarRefreshing(false);
  },[sidebarRefreshing,scanVault]);

  const showWelcome=files.length===0&&tab!=='settings'&&tab!=='actions'&&tab!=='import';
  const showSidebar=!showWelcome&&(tab==='browse'||tab==='search')&&files.length>0;
  const TABS=[{key:'browse',label:'Browse'},{key:'search',label:'Search'},{key:'actions',label:'Actions'},{key:'import',label:'Import'},{key:'chat',label:'Chat'},{key:'stats',label:'Stats'}];

  return React.createElement('div',{style:{display:'flex',flexDirection:'column',height:'100vh'}},
    React.createElement('div',{id:'topbar'},
      React.createElement('div',{className:'logo'},'Axon',React.createElement('span',null,' ◈')),
      React.createElement('div',{id:'search-wrap'},React.createElement('span',{className:'si'},'⌕'),React.createElement('input',{type:'text',placeholder:'Search vault…',value:search,onChange:e=>handleSearch(e.target.value),onFocus:()=>files.length>0&&setTab('search')})),
      files.length>0&&React.createElement('button',{className:'topbar-capture-btn',onClick:()=>setCaptureOpen(true),title:'Capture & Compose'},'+'),
      React.createElement('div',{className:'nav-tabs'},
        TABS.map(t=>React.createElement('button',{key:t.key,className:`nav-tab ${tab===t.key?'active':''}`,onClick:()=>{setTab(t.key);if(t.key==='browse')setActiveFile(null);if(t.key==='chat'&&vaultHandle)scanVault(vaultHandle);}},t.label)),
        React.createElement('button',{className:`nav-tab ${tab==='settings'?'active':''}`,onClick:()=>setTab('settings')},'Settings'),
      )
    ),
    React.createElement('div',{id:'layout'},
      showSidebar&&React.createElement('div',{id:'sidebar',style:{width:sidebarWidth}},
        React.createElement('div',{id:'resize-handle',ref:handleRef,onMouseDown:onResizeMouseDown}),
        React.createElement('div',{className:'sidebar-header'},
          React.createElement('span',{className:'sidebar-header-label'},vaultHandle?.name||'vault'),
          React.createElement('button',{
            className:`sidebar-refresh-btn ${sidebarRefreshing?'spinning':''}`,
            title:'Refresh vault & update index',
            onClick:sidebarRescan,
            disabled:sidebarRefreshing
          },sidebarRefreshing?'Refreshing…':'Refresh'),
          React.createElement('button',{
            className:'sidebar-add-btn',title:'New folder in vault root',
            onClick:()=>{
              const evt=new CustomEvent('axon:new-root-folder');
              document.dispatchEvent(evt);
            }
          },'⊕')
        ),
        React.createElement(FolderTree,{files,activeFile,onSelect:navigate,vaultHandle,onRefresh:()=>rescan(false),onNewFile:onNewFileCreated})
      ),
      React.createElement('div',{id:'main'},
        showWelcome
          ?React.createElement('div',{className:'welcome'},
            React.createElement(AxonIllustration,null),
            React.createElement('div',{className:'welcome-title'},'Your knowledge, ',React.createElement('em',null,'alive.')),
            React.createElement('p',{className:'welcome-sub'},'Open any folder of markdown files. Axon gives you full-text search, backlink navigation, and AI-powered Q&A — no server required.'),
            React.createElement('button',{className:'open-btn',onClick:openVault},'◈ Connect to Brain'),
            React.createElement('div',{className:'vault-hint'},'Works with any markdown directory'),
            React.createElement('button',{className:'setup-link',onClick:()=>setSetupOpen(true)},'Set up Axon for first-time users →')
          )
          :tab==='browse'
            ?editingFile
              ?React.createElement(RichEditor,{
                  file:editingFile,
                  fileHandle:editingHandle,
                  editorMode,
                  onSave:async(newText)=>{
                    // Update file in files array and rescan
                    await rescan(false);
                  },
                  onClose:()=>{setEditingFile(null);setEditingHandle(null);}
                })
              :activeFile
                ?React.createElement(ArticleView,{file:activeFile,files,onNavigate:navigate,onEdit:(f)=>{
                    // Get the file handle for editing
                    (async()=>{
                      try{
                        const parts=f.path.split('/');
                        let dir=vaultHandle;
                        for(let i=0;i<parts.length-1;i++)dir=await dir.getDirectoryHandle(parts[i],{create:false});
                        const fh=await dir.getFileHandle(parts[parts.length-1],{create:false});
                        openEditor(f,fh);
                      }catch(e){openEditor(f,null);}
                    })();
                  }})
                :React.createElement(BrowseLanding,{files,actionTodos,onNavigate:navigate,onGoActions:()=>setTab('actions'),onOpenEduChat:openEduChat,apiKey,eduTopics})
            :tab==='search'?React.createElement(SearchView,{files,onNavigate:navigate})
            :tab==='actions'?React.createElement(ActionsView,{
              actionsHandle,
              onGoSettings:()=>setTab('settings'),
              remindersHandle,
              apiKey,
              onRemindersProcessed:(count)=>{
                if(count>0){
                  setRemindersToast(`${count} reminder${count!==1?'s':''} added to Today`);
                  setTimeout(()=>setRemindersToast(''),4000);
                }
              }
            })
            :tab==='import'?React.createElement(ImportView,{downloadsHandle,vaultHandle,apiKey,onImportComplete:(file)=>{rescan(true);},onGoSettings:()=>setTab('settings'),vaultIndex:vaultIndexRef.current,setVaultIndex,saveIndex})
            :tab==='chat'?React.createElement(AskView,{files,apiKey,chatsHandle,onGoSettings:()=>setTab('settings'),onRescan:rescan,onForceRescan:rescan,pendingChatPrompt,clearPendingPrompt:()=>setPendingChatPrompt(null),vaultIndex,vaultHandle})
            :tab==='stats'?React.createElement(StatsView,{files,actionTodos,vaultHandle})
            :React.createElement(SettingsView,{apiKey,setApiKey,vaultHandle,actionsHandle,downloadsHandle,chatsHandle,remindersHandle,onPickVault:openVault,onPickActions:pickActions,onPickDownloads:pickDownloads,onPickChats:pickChats,onPickReminders:pickReminders,files,actionTodos,darkMode,setDarkMode,eduTopics,setEduTopics,editorMode,setEditorMode})
      )
    ),
    setupOpen&&React.createElement(SetupModal,{onClose:()=>setSetupOpen(false),onComplete:(result)=>{handleSetupComplete(result);setSetupOpen(false);}}),
    remindersToast&&React.createElement('div',{className:'reminders-toast'},remindersToast),
    connectToast&&React.createElement('div',{className:'reminders-toast',style:{bottom:80}},connectToast),
    files.length>0&&tab!=='settings'&&React.createElement('button',{className:'fab',onClick:()=>setCaptureOpen(true),title:'Capture & Compose'},'+'),
    captureOpen&&files.length>0&&React.createElement(CaptureModal,{
      files,apiKey,
      vaultFolders:[...new Set(files.map(f=>f.folder))].filter(Boolean).sort(),
      actionTodos,
      onClose:()=>setCaptureOpen(false),
      onAddTodo:captureAddTodo,
      onSaveNote:()=>{rescan(true);setCaptureOpen(false);},
      vaultHandle
    }),
    files.length>0&&React.createElement('div',{className:'stats-bar'},
      React.createElement('div',{className:'stat-item'},React.createElement('span',null,'notes'),React.createElement('span',{className:'stat-val'},files.length)),
      React.createElement('div',{className:'stat-item'},React.createElement('span',null,'indexed'),React.createElement('span',{className:'stat-val'},vaultIndex.length)),
      React.createElement('div',{className:'stat-item'},React.createElement('span',null,'links'),React.createElement('span',{className:'stat-val'},files.reduce((s,f)=>s+f.backlinks.length,0))),
      indexStatus
        ?React.createElement('div',{className:'index-status'},React.createElement('div',{className:'spinner',style:{width:10,height:10,borderWidth:1.5}}),indexStatus)
        :null,
      activeFile&&React.createElement('div',{className:'stat-item',style:{marginLeft:'auto'}},React.createElement('span',{style:{color:'var(--accent)',fontFamily:'var(--font-mono)',fontSize:11}},activeFile.path))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
